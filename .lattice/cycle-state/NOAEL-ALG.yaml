science_flags_new:
  - id: NOAEL-ALG-SF2
    title: AC-F1-1 expectation conflates per-endpoint BW NOAEL with study-combined NOAEL
    discovered: 2026-04-27T03:30Z
    detail: |
      Synthesis AC-F1-1 says PointCross BW combined NOAEL post-fix = 20 mg/kg.
      Path C output: BW endpoint per-endpoint NOAEL = HD (no dose fires under
      P3 terminal-primary; BUG-031 fix verified). Study-combined NOAEL =
      Not established (pathology at lowest dose drives LOAEL via C4).
      AC-F1-1 needs refinement to distinguish the two quantities — both are
      defensible on the data; the synthesis spec mixes them.
    severity: documentation_clarification (not algorithm defect)
    needs: synthesis spec amendment OR explicit acceptance that AC-F1-1 means per-endpoint
  - id: NOAEL-ALG-SF3
    title: Body Weight Gain has domain BG not BW; falls through to OTHER classification
    discovered: 2026-04-27T03:30Z
    detail: |
      classify_endpoint routes domain="BG" to OTHER (single_timepoint policy).
      Body Weight Gain SHOULD route to BW class (P3 terminal-primary) per
      regulatory framework.
    resolution: FIXED in slice-4 per peer-review finding A8 (BG now routes to BW class).
    fix_complexity: 2-line addition to classify_endpoint
  - id: NOAEL-ALG-SF4
    title: Tox-override hard gate suppresses C4 intrinsic-adverse pathology
    discovered: 2026-04-27T04:30Z (peer-review finding A4)
    detail: |
      The hard-gate `if fc == "not_treatment_related": return False` at the
      top of _is_loael_driving_woe suppresses ALL WoE criteria including C4
      (intrinsic-adverse pathology). A reviewer override of "not treatment
      related" on hepatocellular carcinoma / fibrosis / necrosis would
      therefore silently exclude that finding from LOAEL determination.
      Three considered interpretations:
        (a) reviewer judgment trumps algorithm unconditionally (current code)
        (b) C4 / C5 require additional historical-control validation GATE
            before override applies (algorithm overrides the override)
        (c) ADOPTED 2026-04-27 -- preserve full reviewer authority (no
            algorithmic gate); add a UI confirmation dialog at override-time
            that surfaces HCD context: "This finding falls within historical-
            control range -- confirm override?" If HCD is absent for this
            finding/species, the dialog says "no HCD coverage for this
            finding/species -- proceeding with override". Reviewer confirms,
            override applies. The fix locus is UI/UX (override flow), NOT
            backend algorithm logic. C4 hard-gate stays.
      Merit rationale for (c): algorithmic resistance to a credentialed
      reviewer's explicit override is the system claiming epistemic authority
      it doesn't have. The reviewer has out-of-band knowledge the algorithm
      doesn't (animal-specific context, study conduct issues, batch-level
      confounds). Building gates that override the override puts the algorithm
      in a position to be wrong in exactly the cases the human is trying to
      correct. The right move is to INFORM (give HCD context at decision time),
      not GATE.
      No published literature directly governs this; SOP-level practice.
    needs: implementation of the (c) UI confirmation flow at override-time
      (override dropdowns / context-menu actions in FindingsTable +
      OnsetDoseDropdown / RecoveryOverrideDropdown / PatternOverrideDropdown).
      HCD lookup uses existing brain-concordance / hcd_evidence pathways.
    resolution: user-adjudicated to (c) on 2026-04-27 (replaces the "(a) vs
      (b)" framing -- both were wrong; (b) overrides the override, (a) hides
      HCD context the reviewer needs). Backend algorithm unchanged; UI work
      tracked separately.

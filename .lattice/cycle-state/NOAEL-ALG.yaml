research_questions:
  - id: Q1
    title: LOAEL gate composition
    detail: |
      Survey OECD 407/408, ICH S4, EFSA, EPA Risk Assessment Forum, FDA SEND review
      on what should constitute a LOAEL: significance gate (p_adj < 0.05)? effect-
      size gate (g_lower > 0.3)? consecutive-timepoint requirement? direction-
      consistency requirement? Combine how? Continuous vs incidence likely differ.
  - id: Q2
    title: Multi-timepoint aggregation policy
    detail: |
      When endpoint_label has N daily findings: worst-of-day? sustained >=M
      consecutive? averaged? per-day-then-aggregate? Cite regulatory precedent.
  - id: Q3
    title: Onset-vs-NOAEL coherence
    detail: |
      Onset day and NOAEL determination both consume LOAEL-detection. Should
      they share a single predicate? If not, what justifies the asymmetry?
  - id: Q4
    title: Display-fix disposition
    detail: |
      After algorithm is correct: should three sites consume the new analytics-
      derived NOAEL (consistent + correct), or should UI continue surfacing
      per-site differences (e.g., per-sex breakdown) as informative?

science_flag_resolution:
  resolved: 2026-04-06T23:15:00
  decisions:
    chart_vs_pane: |
      Tighten chart to filter brown dots to loo_per_subject[loo_influential_subject].ratio < 0.8.
      Pane keeps its existing loo_per_subject < 0.8 source. Feature 3 reduces to "add Days/Worst
      columns as enrichment over the existing source" — no hook swap, no semantic change.
    recovery_mode: |
      In recovery mode, pass day: undefined to the hook (endpoint-union of recovery-era influentials).
      No computed recovery day. Day stepper behavior is pre-existing and out of scope.
    apply_button: |
      Keep button in pane with honest global labeling (pendingCount). ADD read-only expandable
      disclosure showing which subjects are pending on which OTHER endpoints, so the global
      scope of the action is transparent. List is read-only — modifying other endpoints'
      exclusions requires navigating to them.
    test_coverage: |
      Add at least one Vitest behavioral test covering BUG-001 scenario: pending exclusion
      on endpoint X, user viewing endpoint Y's LOO pane — button label reflects global count,
      disclosure shows X's subjects.
    bundling: |
      BUG-001 stays bundled with hook reorder and Days/Worst columns. Hook reorder is
      cohesion glue.

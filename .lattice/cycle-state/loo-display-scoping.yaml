    Reconcile LOO influential subject display semantics across the chart and the
    info pane. Chart becomes day-scoped (matches the time slice being shown).
    Info pane stays endpoint-scoped (cross-day visibility for "consistent influencer"
    analysis) and gains a "Days" column listing the days each subject was the LOO
    driver. Bundles BUG-001 fix (Apply button uses global pendingCount instead of
    endpoint-local excludedIds.size).

  files_in_scope:

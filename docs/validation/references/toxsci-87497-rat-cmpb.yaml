# TOXSCI 87497 — 1-Month Rat Compound B (6576, IDO1 Inhibitor)
# Source: No study report. TOXSCI-24-0062 Cross Study Analysis.
# Largest rat study in validation suite (n=160 with TK).

study_id: "TOXSCI-24-0062--87497 1 month rat- Compound B-xpt"
origin: real
source: "TOXSCI-24-0062 publication data. No study report."

design:
  species: "Rat"
  strain: "Sprague-Dawley"
  route: "Oral gavage"
  groups: 4
  doses: [0, 25, 125, 1000]
  dose_unit: "mg/kg/day"
  duration: "4 weeks + 4-week recovery"
  recovery: true
  recovery_pairs: 2  # Control + Mid (not High — unusual)
  n_per_group_control: 26  # 13M+13F
  n_per_group_treated: 20  # 10M+10F
  n_recovery_per_group: 10  # 5M+5F
  control_type: "VEHICLE_CONTROL"
  vehicle: "1% Hydroxyethylcellulose, 0.25% Polysorbate 80, 0.05% Antifoam in purified water"
  treatment: "6576"
  pharmacologic_class: "IDO1 Inhibitor"
  tk_satellites: true  # ~18 per treated group, 0 for control
  note: "Recovery on Mid (not High) — unusual. Very wide dose range (25 to 1000 — 40x). TK in treated groups only. Paired with dog Compound B study (35449)."

noael:
  combined: { dose_level: 1, label: "Low (25 mg/kg/day)", loael_dose_level: 2, confidence: 0.8 }

target_organs: {}

injected_signals: []

assertions:
  - type: "design_groups"
    description: "4 groups, unequal N (control 26, treated 20)"
  - type: "tk_excluded"
    description: "TK satellites (~18/treated group) excluded from analysis"
  - type: "noael_above_control"
    description: "NOAEL at Low dose (25 mg/kg/day), not at control"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from TOXSCI-24-0062 publication data (confidence 0.8 per existing
  # YAML). This is the only rodent study in the validation suite with a
  # NON-TRIVIAL NOAEL: published call is NOAEL at Low (25 mg/kg, level 1),
  # LOAEL at Mid (125 mg/kg, level 2). 0 deaths.
  #
  # ENGINE DISAGREEMENT (expected at time of authoring):
  #   Engine returns noael_combined=null and loael_combined=1 -- it places
  #   LOAEL at the lowest active dose, putting NOAEL below tested range.
  #   The published authors disagree: Low is tolerated. This is a 2-of-3
  #   GROUND_TRUTH disagreement, encoded as SCIENCE-FLAG per audit plan
  #   ("do not weaken assertion to make engine pass"). Likely root cause is
  #   the same over-classification surface that drives the CBER-vaccine
  #   SCIENCE-FLAGs (Study2/Study4) -- engine treats statistical signals
  #   at Low as adverse without applying the dose-response/severity gating
  #   that a toxicologist applies at this exposure level. target_organs
  #   omitted (documentation silent; ambiguous).

  - type: "noael_combined"
    description: "Combined NOAEL = 1 (Low 25 mg/kg tolerated per published call; SCIENCE-FLAG vs engine null)"
    expected_value: 1

  - type: "loael_combined"
    description: "Combined LOAEL = 2 (Mid 125 mg/kg per published call; SCIENCE-FLAG vs engine 1)"
    expected_value: 2

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths)"
    expected_value: null

  # Class distribution: aggregate adversity (≥1 tr_adverse) is correct -- the
  # SCIENCE-FLAG is per-dose placement (engine flags Low as LOAEL when published
  # call is Mid). Per-dose distribution would be a Phase-3 follow-on matcher
  # (per_dose_class_distribution). The aggregate min:1 confirms engine fires SOME
  # adverse finding, which both engine and doc agree on.
  - type: "class_distribution"
    description: "Engine fires tr_adverse (aggregate level; per-dose placement is the SCIENCE-FLAG, not aggregate)"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Cross-organ syndrome (Phase 3 matcher #7 -- AUDIT-20 per-study expansion
  # of phospholipidosis MATCH coverage beyond instem + TOXSCI-96298). Engine
  # emits 1 cross_organ_syndromes entry: phospholipidosis n=1 spanning
  # hepatic+respiratory+renal+hematologic. Single subject is a low-incidence
  # detection (Compound B at the per-subject dose levels in this study
  # produces minimal phospholipidosis vs Compound A's aggressive 32-subject
  # signal in TOXSCI-96298), but the engine correctly fires the multi-organ-
  # definition syndrome at the n=1 floor. MATCH at min_count=1 -- pins both
  # the syndrome_id + the four-organ span + the engine's correct emission
  # under low-prevalence conditions.
  - type: "cross_organ_syndrome"
    description: "Phospholipidosis cross-organ entry (hepatic+respiratory+renal+hematologic; n>=1 -- low-prevalence MATCH counter-example to TOXSCI-96298 n=32)"
    expected_syndrome_id: "phospholipidosis"
    expected_organs: ["hepatic", "respiratory", "renal", "hematologic"]
    min_count: 1

  # tumor_detected (Phase 3 matcher #4 -- AUDIT-16 per-study expansion). 4-week
  # + 4-week-recovery rat study (Compound B, SD, 0/25/125/1000 mg/kg). Engine
  # emits has_tumors=true on a single spontaneous benign kidney adenoma in M
  # control animal (1/13 control, 0/10 at all treated doses; trend_p=0.22 --
  # NOT dose-trend-positive). Defensible call: this is a background incidence
  # in untreated control, NOT treatment-related. Engine's binary has_tumors
  # flag is operating correctly per its definition (any isNeoplastic finding
  # fires the surface), but the flag does not differentiate spontaneous vs
  # treatment-related tumors -- downstream consumers (NOAEL pipeline, target-
  # organ rollup, adversity classification) must not interpret has_tumors=
  # true as adversity in the absence of dose-trend evidence. REGRESSION_PIN
  # locks the engine's correct detection of the kidney adenoma in summaries;
  # per-tumor pin asserts the morphology surfaces. Counter-example to the 13
  # other AUDIT-16 absence-pin authoring (which lock has_tumors=false) -- this
  # is the only AUDIT-16 study with a non-empty tumor_summary, exercising
  # the engine's positive-detection path on a low-incidence background lesion.
  - type: "tumor_detected"
    description: "Single spontaneous KIDNEY ADENOMA BENIGN in M control (1/13; 0/10 at all treated; trend_p=0.22 -- background incidence, not treatment-related); engine has_tumors=true correctly fires on isNeoplastic flag (regression pin -- downstream consumers must differentiate spontaneous vs treatment-related)"
    expected_has_tumors: true
    expected_tumors:
      - organ: "KIDNEY"
        morphology_pattern: "ADENOMA"
        min_count: 1

# Study2 — 456a Vaccine in NZW Rabbits
# Source: CBER-POC study report (CBER-POC.pdf pp.9-12), nSDRG
# All findings considered NOT adverse by investigators — pharmacology-related

study_id: CBER-POC-Pilot-Study2-Vaccine_xpt
origin: synthetic
source: "CBER-POC study report pp.9-12, nSDRG"

design:
  species: "Rabbit"
  strain: "New Zealand White"
  route: "Intramuscular"
  groups: 2  # Control + 456a
  doses: [0]  # treatment dose is null in XPT (biologic — no numeric dose value)
  dose_unit: "vp/dose"
  note_doses: "Treatment group is 1x10^11 VP but XPT encodes dose_value=None"
  duration: "29 days (3 doses, q2w)"
  recovery: true
  recovery_duration: "21 days"
  n_per_group: 20  # 10M+10F (5/sex main, 5/sex recovery)
  control_type: "VEHICLE_CONTROL"  # none stated in report, but control group present

noael:
  combined:
    dose_level: null
    label: "Not established"
    note: "LOAEL at lowest active dose -- NOAEL below tested range. Engine correct without D9 — vaccine findings are statistically tr_adverse. Report says treatment dose (all non-adverse, pharmacology-related). NOAEL shifts to treatment dose once D9 compound profile scoring is active."

# Report does not identify target organs — all findings are pharmacology-related
target_organs: {}

# Signals documented in study report summary table (pp.11-12).
# These are known pharmacological effects baked into the synthetic data.
# Report explicitly states all are NOT adverse. Engine should detect but may over-classify.
injected_signals:
  - name: "CRP elevation"
    domain: "LB"
    test_pattern: "c.reactive|crp"
    direction: "up"
    expected_class: "tr_adverse"
    note: "Day 2: M 65.5x, F 11.7x control. Day 30: M 33.5x, F 8.1x. Report: not adverse. (report p.12)"

  - name: "Fibrinogen elevation"
    domain: "LB"
    test_pattern: "fibrinogen"
    direction: "up"
    expected_class: "tr_adverse"
    note: "Day 3: M 1.97x (p<0.001), F 2.00x (p<0.001). Day 31: M 1.75x (p<0.01), F 1.65x (p<0.05). Report: not adverse. (report p.12)"

  - name: "Monocyte elevation"
    domain: "LB"
    test_pattern: "monocyte"
    direction: "up"
    note: "Day 3: M 2.7x (p<0.05), F 3.0x (p<0.01). Day 31: F only 2.1x (p<0.001). M borderline. (report p.11)"

  - name: "Globulin elevation"
    domain: "LB"
    test_pattern: "globulin"
    direction: "up"
    note: "Day 3: M 1.3x (p<0.001), F 1.2x (p<0.001). Day 31: similar. (report p.11)"

  - name: "A/G ratio decrease"
    domain: "LB"
    test_pattern: "a/g|albumin.*globulin"
    direction: "down"
    note: "Day 3: M 0.78x (p<0.001), F 0.82x (p<0.001). (report p.11)"

  - name: "Spleen hyperplasia"
    domain: "MI"
    specimen_pattern: "spleen"
    note: "Increased lymphoid cellularity of germinal centre. Correlated with higher spleen weights. (report p.9)"

  - name: "Iliac LN hyperplasia"
    domain: "MI"
    specimen_pattern: "iliac|lymph"
    note: "Increased generalised lymphoid cellularity. Gross enlargement in 1F. Correlated with higher LN weights. (report p.9)"

  - name: "Iliac LN weight increase"
    domain: "OM"
    specimen_pattern: "iliac|lymph"
    note: "Correlated with lymphoid hyperplasia. (report p.9)"

  - name: "Spleen weight increase"
    domain: "OM"
    specimen_pattern: "spleen"
    note: "Slightly higher in both sexes. (report p.9)"

  - name: "Injection site inflammation"
    domain: "MI"
    specimen_pattern: "site.*application|injection|administration|muscle.*skeletal"
    note: "Inflammation, necrosis, hemorrhage in striated muscle/fascia. SEND specimen: 'SITE, APPLICATION'. Engine classifies as not_treatment_related — known gap (injection site findings lack dose-response in 2-group design). (report p.9)"

assertions:
  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from CBER-POC.pdf pp.9-12. Investigators classified ALL findings
  # as pharmacology-related and non-adverse (CRP/fibrinogen/globulin elevation,
  # spleen + LN hyperplasia, injection site reaction): an immunological
  # response signature, not toxicity.
  #
  # GROUND_TRUTH per the credentialed reviewer's call:
  #   noael_combined = 1   (treatment dose tolerated; no adverse findings)
  #   loael_combined = null (no LOAEL -- no findings deemed adverse)
  #   mortality_loael = null (zero deaths)
  #   target_organs_flagged = []  (no targets per investigators)
  #
  # ENGINE DISAGREEMENT (expected at time of authoring):
  #   Engine produces noael=null, loael=1, 5 organs flagged because it lacks
  #   compound-class context (this is a vaccine; immunological elevations are
  #   pharmacology, not toxicity). The 3-of-4 disagreement is the SCIENCE-FLAG.
  #   Encoding the toxicologist's call as the GROUND_TRUTH is per CLAUDE.md
  #   rule 21 (algorithm-as-advisor; credentialed reviewer's call is final)
  #   and the audit plan's "do not weaken assertion to make engine pass"
  #   directive. The disagreement is documented in the commit message and
  #   added to .assertion-baseline.json as known-failures (SCIENCE-FLAG, not
  #   author error). Resolution requires compound-class profile scoring (D9).

  - type: "noael_combined"
    description: "Combined NOAEL = 1 (treatment dose tolerated per report; engine over-classifies absent compound-class context)"
    expected_value: 1

  - type: "loael_combined"
    description: "Combined LOAEL = null (no findings deemed adverse by report; SCIENCE-FLAG vs engine output)"
    expected_value: null

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths; report says no mortality concerns)"
    expected_value: null

  - type: "target_organs_flagged"
    description: "Zero target organs (report: pharmacology, not toxicity; SCIENCE-FLAG vs engine 5-organ flagging)"
    expected_organs: []
    expect_only: true

  # Class distribution: per report, all findings are pharmacology-related and
  # NON-adverse. Engine produces 42 tr_adverse + 162 equivocal -- the SCIENCE-FLAG
  # at the source level. tr_adverse: {max: 0} mechanically encodes the report's call.
  - type: "class_distribution"
    description: "Zero tr_adverse per report (all pharmacology); SCIENCE-FLAG vs engine 42 tr_adverse"
    expected_classes:
      tr_adverse: { max: 0 }
      not_assessed: { exact: 0 }

  # Compound class flag (Phase 3 matcher #5 -- AUDIT-7). Source: SME-confirmed
  # annotation `backend/annotations/CBER-POC-Pilot-Study2-Vaccine_xpt/
  # compound_profile.json` -- compound_class: "vaccine_non_adjuvanted",
  # original_compound_class: "vaccine", confirmed_by_sme: true. 456a vaccine
  # in NZW rabbits (CBER-POC.pdf pp.9-12). Expected MISMATCH: engine has no
  # vaccine classifier in pk_integration.py modality-detection path; output
  # is null -- D9 Stream 1 root cause surfaced at source. Reinforces this
  # study's existing class_distribution / NOAEL / target_organs flags from
  # the same root cause (engine cannot reason about vaccine pharmacology
  # without a compound-class signal).
  - type: "compound_class_flag"
    description: "Compound modality = vaccine (456a IM rabbit; SME-confirmed vaccine_non_adjuvanted)"
    expected_compound_class: "vaccine"

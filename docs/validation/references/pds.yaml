# PDS — 1-Month Repeat-Dose Toxicity + Recovery (FDA-Validated SEND 3.0)
# Source: PDS readme.md — no signal documentation, design only
# "Anonymized SEND data set that has been successfully run through the FDA's validation process"

study_id: PDS
origin: synthetic
source: "PDS readme.md, define.pdf. No study report — no signal documentation."

design:
  species: "Rat"
  strain: "Sprague-Dawley"
  route: "Oral gavage"
  groups: 4
  doses: [0, 20, 200, 400]
  dose_unit: "mg/kg"
  duration: "1 month (30 days)"
  recovery: true
  recovery_pairs: 2  # Vehicle + High
  n_per_group: 26  # 13M+13F main
  n_recovery_per_group: 10  # 5M+5F
  control_type: "VEHICLE_CONTROL"
  vehicle: "Methocell"
  treatment: "PDS-FAKEDRUG-111"
  note: "Inter-organizational SEND dataset — multiple LIMS sources (tox, clin path, pathology, PK)."

noael:
  combined:
    dose_level: null
    label: "Not established"
    loael_dose_level: 1
    loael_label: "Low (20 mg/kg)"
    confidence: 0.8
    note: "LOAEL at lowest active dose -- NOAEL below tested range"

target_organs: {}  # No report to confirm

injected_signals: []  # No signal documentation available

assertions:
  - type: "design_groups"
    description: "4 groups correctly parsed with vehicle control"
  - type: "recovery_detected"
    description: "2 recovery pairs (Vehicle + High) detected"
  - type: "sex_stratified_merge"
    description: "Recovery arms merged into pooled N of 18M/18F for Vehicle and High"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from PDS readme.md + define.pdf (no signal documentation). Doc
  # YAML's noael block: LOAEL at Low (20 mg/kg, level 1), NOAEL=null. 1 death
  # in the corpus -- a control female found dead day 3 with cause undetermined
  # (PDS2014-0119); engine correctly classifies as not-treatment-related so
  # mortality_loael=null is the defensible call (a control death cannot
  # establish a treatment-mortality LOAEL). target_organs omitted: no signal
  # documentation to anchor against.

  - type: "noael_combined"
    description: "Combined NOAEL = null (LOAEL at Low 20 mg/kg per readme)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = 1 (20 mg/kg, lowest treated dose)"
    expected_value: 1

  - type: "mortality_loael"
    description: "mortality_loael = null (1 control death PDS2014-0119, cause undetermined; correctly not attributable to treatment)"
    expected_value: null

  - type: "class_distribution"
    description: "Engine produces tr_adverse findings (LOAEL at Low fires); all findings classified"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Recovery verdict (Phase 3 matcher #6 -- AUDIT-17 per-study expansion of
  # recovery_verdict beyond PointCross). Sources:
  #   1. recovery_verdicts.json: PDS has n=10 HIGH-recovery subjects (5M+5F
  #      "M/F - High - with recovery" arms); LOW and MED have no recovery
  #      animals. 175 of 375 records are "not_examined" (many MI sites only
  #      assessed in main arm), but liver and adrenal hepatic findings have
  #      complete recovery readings.
  #   2. unified_findings.json: hepatic and adrenal vacuolization documented
  #      as treatment-related in main arm.
  #
  # LIVER VACUOLIZATION HIGH (10/10 reversed): all 5M + 5F HIGH-recovery
  # subjects show verdict="reversed" -- engine correctly identifies hepatic
  # vacuolization (typically lipid accumulation) resolving in the post-dose
  # recovery window. Sex-symmetric reversal pattern. MATCH at min_count=10
  # (full cohort agreement).
  #
  # Adrenal vacuolization NOT authored as separate assertion: M shows 5/5
  # reversed but F shows 5/5 partially_reversed -- the sex-asymmetric verdict
  # split (different verdicts at same dose) doesn't fit the matcher's single-
  # verdict-per-assertion shape. Captured in this comment as documentation;
  # if the matcher gains a sex filter (parallel to AUDIT-9 noael_combined),
  # author then.
  #
  # Stream 4 does NOT reproduce in PDS: engine emits correct reversed verdict
  # for the cohort-presence finding. Adds another counter-evidence point to
  # the narrow-PC-Stream-4 hypothesis.
  - type: "recovery_verdict"
    description: "HIGH liver vacuolization: reversed verdict (10/10 cohort 5M+5F; engine correctly identifies hepatic lipid vacuolization resolving in recovery window)"
    dose_level: 3
    domain: "MI"
    specimen_pattern: "LIVER"
    finding_pattern: "VACUOLIZATION"
    expected_verdict: "reversed"
    min_count: 10

  # Cofiring presentation (AUDIT-19, Stream 5 closure 2026-05-01). PDS
  # target_organs at HIGH spans many systems but only a subset translate to
  # firing syndromes -- post-AUDIT-19 the cofiring surface emits 4 distinct
  # primary organ_systems at HIGH 400 (general, hematologic, hepatic, ocular)
  # with 17/26 subjects affected, plus 3 organ_systems at HIGH Recovery
  # (endocrine, hematologic, reproductive). The narrower-than-target_organs
  # count reflects the syndrome layer's stricter detection (XS04 myelosuppression,
  # XS01 hepatocellular injury, XS07 immunotoxicity, etc. require specific finding
  # patterns); target_organ_summary's broader 14 reflects mere statistical
  # significance. cofiring presentation captures the toxicologist-meaningful
  # multi-organ pattern.
  #
  # min_organ_systems=4 pins the rich-presentation form per the HIGH cell.
  - type: "cofiring_presentation"
    description: "Multi-organ co-firing at HIGH (4 organs Main + 3 organs Recovery; 17/26 subjects). AUDIT-19 (Stream 5) cleared 2026-05-01."
    min_count: 1
    min_organ_systems: 4

  # Onset concordance (Phase 3 matcher #8 -- AUDIT-22 corpus-wide expansion to
  # rat PDS, 4th rat study after PointCross + TOXSCI-96298 + instem). Anchors:
  # subject_onset_days.json (per-subject LB:{TEST} -> first onset_day) joined
  # with unified_findings.json LB cohort statistics at HIGH (dose=3, 400 mg/kg).
  #
  # 1. CHOL (cholesterol, hepatic chemistry) -- regression pin (engine catches
  #    cohort signal partially). HIGH cohort: F ctrl=72.3 -> 130 (1.79x at
  #    day 30, p=1e-6, g=2.85; 1.92x at day 31, p=0.002, g=1.88,
  #    treatment_related=True). Engine emits 6/36 subjects (all F) by day 31
  #    -- the 6 F subjects whose individual values cross the 2x threshold.
  #    MATCH at min_count=5 pins the engine's correct partial detection on a
  #    cohort F effect approaching but not crossing 2x at the population mean.
  #    Counter-evidence to instem CHOL SCIENCE-FLAG (where engine emits 0):
  #    PDS's larger F cohort effect (g=2.85 vs instem g=2.19) tips the per-
  #    subject distribution above threshold for >=5 subjects.
  #
  # 2. RETI (reticulocyte count, hematopoiesis) -- SCIENCE-FLAG Stream 6 cross-
  #    study reproduction in NEW organ system (erythropoiesis, not hepatic).
  #    HIGH F cohort: ctrl=178 -> 255 at day 30 (1.43x, p=0.0003, g=1.83,
  #    treatment_related=True) + ctrl=168 -> 307 at day 31 (1.83x, p=0.01,
  #    g=1.55, treatment_related=True). Robust dose-response with regenerative
  #    bone-marrow signal. Engine emits 2/36 subjects (both F) by day 31 --
  #    the per-subject 2x rule misses the cohort because reticulocyte values
  #    are intrinsically variable, individual subjects don't all cross 2x.
  #    Stream 6 broadens beyond hepatic chemistry to hematopoiesis: same
  #    "cohort g>=1.5 + p<0.01 missed by per-subject 2x" pattern, different
  #    organ system. Confirms the per-subject 2x rule's blind spot is
  #    structural to the threshold logic, not specific to liver biology.
  - type: "onset_concordance"
    description: "HIGH CHOL onset registered for >=5 subjects by day 31 (regression pin -- engine catches 6/36 F cohort 1.79-1.92x p<0.01 g>=2 via 2x rule, partial-detection counter-example to instem CHOL miss at smaller g)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^CHOL$"
    max_onset_day: 31
    min_count: 5
  - type: "onset_concordance"
    description: "HIGH RETI onset registered for >=5 subjects by day 31 (cohort F 1.43-1.83x at days 30-31, p=0.0003-0.01 g=1.55-1.83, treatment_related=True -- engine emits 2/36 SCIENCE-FLAG Stream 6 cross-study reproduction in 4th rat study, NEW organ system: hematopoiesis/erythropoiesis)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^RETI$"
    max_onset_day: 31
    min_count: 5

  # tumor_detected (Phase 3 matcher #4 -- AUDIT-16 per-study expansion). 1-month
  # rat repeat-dose study (Sprague-Dawley, n=26-36/dose, multi-organ syndrome-
  # active including hematopoiesis/erythropoiesis Stream 6 trigger). Engine
  # emits has_tumors=false with empty summaries. Defensible per regulatory
  # toxicology convention -- 30-day rodent repeat-dose is below carcinogenicity
  # assay duration; tumor formation at this duration is rare/incidental and not
  # a study endpoint regardless of multi-organ syndrome activity. Absence pin --
  # regression pin locking engine's correct refusal.
  - type: "tumor_detected"
    description: "No tumors expected in 1-month rat repeat-dose (SD, n=26-36/dose); engine has_tumors=false (regression pin)"
    expected_has_tumors: false

  # severity_distribution (Phase 3 matcher #2 -- AUDIT-15 per-study expansion).
  # Authored from per-finding pathologist severity grades in SEND MA records:
  # the toxicologic pathologist's grade IS the regulatory authority per STP
  # severity grading conventions. PDS is the broadest multi-organ severity
  # study in the corpus -- 5 organ systems at moderate grade (hepatic, general,
  # renal, endocrine, integumentary all at 3.0). Multi-system pathologist-
  # graded subchronic effect; pairs with this study's existing Stream 5 + 6
  # SCIENCE-FLAGs (14-organ co-firing + RETI onset miss) to characterize the
  # broad blast radius. Organs below moderate (cardiovascular=2.0, respiratory
  # =2.25, ocular=2.0, hematologic=2.5, gastrointestinal=2.0) omitted.
  - type: "severity_distribution"
    description: "5-organ moderate pathologist grades (hepatic + general + renal + endocrine + integumentary at >=3; broad multi-system subchronic effect)"
    expected_severity:
      hepatic: { min: 3 }
      general: { min: 3 }
      renal: { min: 3 }
      endocrine: { min: 3 }
      integumentary: { min: 3 }

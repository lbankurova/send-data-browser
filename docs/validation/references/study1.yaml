# Study1 — Hepatitis B Vaccine T-Cell Dependent Antibody Response
# Source: Covance study 8326556 nSDRG + report
# Single-arm immunogenicity characterization — NOT a toxicity study

study_id: CBER-POC-Pilot-Study1-Vaccine_xpt_only
origin: synthetic
source: "Covance study 8326556, nSDRG pp.3-5"

design:
  species: "Primate"
  strain: "Cynomolgus"
  route: "Intramuscular"
  groups: 1
  doses: [20]  # 20 ug/dose, single arm
  dose_unit: "ug/dose"
  duration: "immunogenicity characterization"
  recovery: false
  n_per_group: 4  # 4F only
  has_concurrent_control: false
  note: "Selected for: vaccine compound, immunology endpoints, standard clinical path/obs. Limitations: no control group, relies on sister study, no biodistribution/TK/respiratory/mortality endpoints."

noael:
  combined: { dose_level: null, label: "Not established", derivation: "no_concurrent_control" }

target_organs: {}

injected_signals: []

assertions:
  # ---- Existing concrete assertions (kept) ----------------------------------
  - type: "zero_adverse"
    description: "No tr_adverse findings -- single-arm, no control, not a tox study"
  - type: "no_concurrent_control"
    description: "has_concurrent_control = false"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from Covance study 8326556 nSDRG. Single-arm immunogenicity
  # characterization (not a tox study), 4 female cynos, 20 ug/dose IM, no
  # control group, no mortality endpoint, 135 raw findings all classified as
  # not_assessed (no statistical comparison possible without control). NOAEL
  # claim would require either a baseline cohort or a sister-study comparator
  # the harness does not currently bridge -- engine correctly returns null.
  # These four assertions mechanically protect that defensible "null" output.

  - type: "noael_combined"
    description: "Combined NOAEL = null (no concurrent control -> no defensible NOAEL)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = null (no concurrent control -> no defensible LOAEL)"
    expected_value: null

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths; no mortality endpoint in study design)"
    expected_value: null

  - type: "target_organs_flagged"
    description: "Zero target organs -- no statistical adversity calls possible without a control"
    expected_organs: []
    expect_only: true

  # Class distribution: no concurrent control -> engine MUST produce only not_assessed.
  # Any other classification would mean engine fabricated a comparison without a control.
  - type: "class_distribution"
    description: "All findings not_assessed (no concurrent control; engine cannot fabricate adversity calls)"
    expected_classes:
      tr_adverse: { exact: 0 }
      tr_non_adverse: { exact: 0 }
      tr_adaptive: { exact: 0 }
      equivocal: { exact: 0 }
      not_treatment_related: { exact: 0 }

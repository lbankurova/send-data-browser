# TOXSCI 35449 — 1-Month Dog Compound B (6576, IDO1 Inhibitor)
# Source: No study report. TOXSCI-24-0062 Cross Study Analysis.
# Part of 2x2 cross-species panel: Compound A (5492) + Compound B (6576), Rat + Dog.

study_id: "TOXSCI-24-0062--35449 1 month dog- Compound B-xpt"
origin: real
source: "TOXSCI-24-0062 publication data. No study report."

design:
  species: "Dog"
  strain: "Beagle"
  route: "Oral gavage"
  groups: 4
  doses: [0, 3, 18, 356]
  dose_unit: "mg/kg/day"
  duration: "4 weeks + 4-week recovery"
  recovery: true
  recovery_pairs: 2  # Control + High
  n_per_group: 6  # 3M+3F
  n_recovery_per_group: 4  # 2M+2F
  control_type: "VEHICLE_CONTROL"
  vehicle: "Polymer (70% HPMC-AS-M) in ultra pure water"
  treatment: "6576"
  pharmacologic_class: "IDO1 Inhibitor"
  note: "Very wide dose range (3 to 356 — 119x spread). Paired with rat Compound B study (87497)."

noael:
  combined:
    dose_level: null
    label: "Not established"
    loael_dose_level: 1
    confidence: 0.8
    note: "LOAEL at lowest active dose -- NOAEL below tested range"

target_organs: {}

injected_signals: []  # Real study, no ground truth

assertions:
  - type: "design_groups"
    description: "4 groups with vehicle control and 2 recovery pairs"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from TOXSCI-24-0062 publication data (no separate study report).
  # The reference YAML's noael block encodes the published call: LOAEL at the
  # lowest active dose (3 mg/kg, level 1), NOAEL below tested range (null).
  # No deaths reported. target_organs is documented as {} (silent), so the
  # target_organs_flagged assertion is omitted -- not asserting "zero" because
  # the engine flags 5 organs at LOAEL hits and the silence in docs is
  # ambiguous, not denial.

  - type: "noael_combined"
    description: "Combined NOAEL = null (LOAEL at Group 1 = 3 mg/kg per published data)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = 1 (lowest active dose 3 mg/kg)"
    expected_value: 1

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths)"
    expected_value: null

  - type: "class_distribution"
    description: "Engine produces tr_adverse findings (LOAEL fires); all findings classified"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Onset concordance (AUDIT-22 cross-species expansion of AUDIT-8 PointCross
  # anchor + AUDIT-22 TOXSCI-96298 cross-study). Closes the cross-species half:
  # rat (PC + TOXSCI-96298) -> dog (this study + 43066). 1-month dog with
  # terminal LB sampled M day 27 + F day 28; HIGH dose group_order=3
  # (5M+5F = 10 HIGH subjects, all 10 present in subject_onset_days.json).
  # Two assertions test orthogonal halves of Stream 6 reproducibility:
  #
  # 1. ALP regression pin (MATCH): hepatic alkaline phosphatase rises strongly
  #    at HIGH M (cohort 2.12x, g=1.58, p=0.024) AND F (cohort 1.68x, g=0.93).
  #    Engine catches 5/10 HIGH subjects via the 2x rule (3M at day 27 + 2F
  #    at day 28). Locks correct emission on hepatic ALP cross-species --
  #    rat anchor PC ALP HIGH cohort 1.29x M / 1.53x F gave 0/29 SCIENCE-FLAG;
  #    dog HIGH cohort 2.12x M crosses the per-subject 2x threshold for 3 of 5
  #    M subjects, giving the engine its design-intent emission. Sister
  #    counter-example: same engine path that misses cohort-level adversity
  #    at <2x cohort (PC ALP) catches it cleanly at >=2x cohort (35449 ALP M).
  #
  # 2. AST SCIENCE-FLAG: hepatic aspartate aminotransferase rises at HIGH F
  #    (cohort 1.95x, g=1.29, p=0.051, severity=adverse) and weakly at HIGH M
  #    (cohort 1.30x, g=1.15, p=0.079, severity=warning). Engine emits 2/10
  #    (both F: 35449-4504 + 35449-4505) -- F cohort 1.95x is borderline-2x
  #    and only 2 of 5 F subjects cross threshold; M cohort 1.30x doesn't
  #    yield any per-subject 2x crossings. Toxicologist would call AST
  #    elevation hepatic-adverse in both sexes given the cohort g, the
  #    p_value approaching significance in F, and target-organ-flag=true on
  #    hepatic. Cross-species reproduction of PC AST HIGH 1/29 Stream 6
  #    pattern (rat: cohort 1.41x M / 1.56x F sub-2x cohort; engine 1/29)
  #    transposed to dog (cohort 1.30x M / 1.95x F sub-2x cohort; engine
  #    2/10). Same root cause: per-subject 2x rule misses cohort-level
  #    adversity at <2x per-subject. min_count=5 paralleling PC AST template
  #    (>=5 of N HIGH subjects expected); engine 2/10 fails.
  - type: "onset_concordance"
    description: "HIGH ALP onset registered for >=5 subjects by day 28 (regression pin -- engine catches dog cohort M 2.12x / F 1.68x, 5/10 HIGH; cross-species MATCH counter-example)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^ALP$"
    max_onset_day: 28
    min_count: 5
  - type: "onset_concordance"
    description: "HIGH AST onset registered for >=5 subjects by day 28 (cohort F 1.95x g=1.29 p=0.051 / M 1.30x g=1.15 -- engine emits 2/10 SCIENCE-FLAG Stream 6 cross-species reproduction of PC AST 1/29)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^AST$"
    max_onset_day: 28
    min_count: 5

  # Recovery verdict (Phase 3 matcher #6 -- AUDIT-17 per-study expansion of
  # recovery_verdict beyond PointCross). Sources:
  #   1. recovery_verdicts.json: TOXSCI-35449 dog Compound B has n=4 HIGH-
  #      recovery subjects (35449-4506..4509). Engine emits 100 records all
  #      with verdict="insufficient_n" -- one per (specimen, finding) tuple
  #      across MI/MA/CL where any HIGH-recovery dog had a finding.
  #   2. subject_context.json: only HIGH (dose_level=3) has a recovery cohort;
  #      LOW (3 mg/kg) and MED (18 mg/kg) have no recovery animals.
  #
  # The engine's verdict logic (compute_incidence_recovery via onset_recovery.py)
  # gates on cohort N before emitting reversed/persistent/anomaly. With n=4
  # HIGH-recovery dogs, all verdicts collapse to "insufficient_n" -- engine
  # correctly refuses to classify under low statistical power. This is the
  # CORRECT engine behavior: a 4-subject recovery cohort cannot defensibly
  # support reversed/persistent/anomaly determinations for routine MI lesions
  # (a single individual's finding is 25% of the cohort, dwarfing baseline
  # noise). Authoring this as a structural absence-pin per CLAUDE.md rule 18
  # (contract-triangle hygiene: declaration site = recovery_verdicts.py
  # n-threshold guard; enforcement site = this assertion; consumption site =
  # Cohort view recovery filter).
  #
  # Counter-example to PointCross HIGH hepatic hypertrophy SCIENCE-FLAG:
  # PC's HIGH-recovery cohort had n=10 (sufficient), engine emitted "anomaly"
  # against cohort main-arm 9/10 sev 2.56 (Stream 4). Here n=4 (insufficient),
  # engine refuses to classify -- which is what the n-threshold guard SHOULD
  # do. This pin documents that the Stream 4 false-anomaly path is gated by
  # cohort N and does not fire under low-power conditions.
  - type: "recovery_verdict"
    description: "HIGH MI records emit insufficient_n verdict (n=4 dog recovery cohort below engine's classification threshold; correct engine refusal -- absence pin for n-threshold guard)"
    dose_level: 3
    domain: "MI"
    expected_verdict: "insufficient_n"
    min_count: 10

  # tumor_detected (Phase 3 matcher #4 -- AUDIT-16 per-study expansion). 4-week
  # + 4-week-recovery dog study (Compound B). Engine emits has_tumors=false
  # with empty summaries. Defensible per regulatory toxicology convention --
  # 4-week canine repeat-dose cannot detect neoplasms (carcinogenicity assess-
  # ment is rodent-only, 2-year design); even chronic 1-year canine studies
  # do not reliably detect spontaneous tumors due to small N (n=4-10/dose).
  # Absence pin -- regression pin locking engine's correct refusal under
  # short-duration canine conditions.
  - type: "tumor_detected"
    description: "No tumors expected in 4-week dog repeat-dose (Compound B, n=10/dose); engine has_tumors=false (regression pin)"
    expected_has_tumors: false

# TOXSCI 43066 — 1-Month Dog Compound A (5492, IDO1 Inhibitor)
# Source: No study report. TOXSCI-24-0062 Cross Study Analysis.

study_id: "TOXSCI-24-0062--43066 1 month dog- Compound A-xpt"
origin: real
source: "TOXSCI-24-0062 publication data. No study report."

design:
  species: "Dog"
  strain: "Beagle"
  route: "Oral gavage"
  groups: 4
  doses: [0, 25, 50, 100]
  dose_unit: "mg/kg/day"
  duration: "1 month + 2-week recovery"
  recovery: true
  recovery_pairs: 3  # Control + Mid + High
  n_per_group: 6  # 3M+3F
  n_recovery_per_group: 4  # 2M+2F
  control_type: "VEHICLE_CONTROL"
  vehicle: "0.5% Methocel A4M, 0.1% Tween 80, 99.4% water"
  treatment: "5492"
  pharmacologic_class: "IDO1 inhibitor (selective indoleamine-pyrrole 2,3-dioxygenase 1)"
  note: "3 recovery pairs (unusual — most studies recover only Control + High). Sex-divergent NOAEL (M: 0, F: 25 mg/kg/day). Paired with rat Compound A study (96298)."

noael:
  combined:
    dose_level: null
    label: "Not established"
    loael_dose_level: 1
    confidence: 0.8
    note: "LOAEL at lowest active dose -- NOAEL below tested range"
  female: { dose_level: 1, label: "Low (25 mg/kg/day)", loael_dose_level: 2, confidence: 0.6 }

target_organs: {}

injected_signals: []

assertions:
  - type: "design_groups"
    description: "4 groups with 3 recovery pairs"
  - type: "sex_divergent_noael"
    description: "NOAEL differs by sex — M at control, F at 25 mg/kg/day"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from TOXSCI-24-0062 publication data. Combined NOAEL=null (LOAEL
  # at Group 1 = 25 mg/kg). Sex-divergent: F-NOAEL=1 (25 mg/kg) but the
  # current harness has no female-NOAEL matcher, so only Combined is encoded.
  # No deaths. target_organs documented as {} (silent); omitting the assertion
  # because the engine flags 7 organs and "silence is not denial" -- per the
  # audit plan's "if ambiguous, omit" directive.

  - type: "noael_combined"
    description: "Combined NOAEL = null (LOAEL at Group 1 per published data)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = 1 (25 mg/kg)"
    expected_value: 1

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths)"
    expected_value: null

  - type: "class_distribution"
    description: "Engine produces tr_adverse findings (LOAEL fires); all findings classified"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Sex-specific NOAEL: published TOXSCI-24-0062 analysis identifies a
  # sex-divergent NOAEL (per noael block above + existing sex_divergent_noael
  # assertion). M-NOAEL = 0 (below tested range -- M shows effects at lowest
  # active dose) and F-NOAEL = 1 (25 mg/kg, F tolerates Low). Engine returns
  # M=null and F=null. M matches doc (null = "below tested range"); F is a
  # NEW SCIENCE-FLAG -- engine fails to recognize female tolerance at Low.
  #
  # Same root cause as TOXSCI-87497 (Stream 2 low-dose severity) but on the
  # F stratum. Adds evidence to Stream 2's blast radius.

  - type: "noael_combined"
    description: "Male NOAEL = null (M shows effects at lowest active dose per published analysis)"
    sex: "M"
    expected_value: null

  - type: "noael_combined"
    description: "Female NOAEL = 1 (Low 25 mg/kg tolerated per published call; SCIENCE-FLAG vs engine null -- Stream 2 evidence)"
    sex: "F"
    expected_value: 1

  # Onset concordance (AUDIT-22 cross-species expansion -- 43066 paired with
  # 35449 closes the cross-species half: rat -> dog Stream 6 reproduction).
  # 1-month dog with terminal LB at day 29; HIGH dose group_order=3
  # (5M+5F = 10 HIGH subjects). UNLIKE the rat anchors (PC + TOXSCI-96298)
  # and the dog Compound B sister study (35449), 43066 dog Compound A's
  # HIGH-dose adversity manifests primarily as cohort-level DECREASES on
  # hepatic + renal markers, NOT increases:
  #   - ALT M cohort 1.11x (small inc) / F cohort 0.71x g=-1.99 (29% decrease,
  #     severity=adverse, tr=True)
  #   - ALP M cohort 0.62x g=-2.29 (38% decrease, severity=warning, tr=True)
  #     / F severity=normal (engine filter skips)
  #   - UREAN M cohort 0.75x g=-6.47 (renal decrease, severity=adverse, tr=True)
  # Engine emits ZERO post-treatment HIGH-dose LB onsets for any of these
  # markers (only LB:VOLUME 1/10 + pre-tx baseline outliers in TRIG/CK/ALP).
  #
  # This surfaces a NEW Stream 6 dimension that the rat anchors did not test:
  # the engine's per-subject threshold uses `abs(val) > 2.0 * abs(ctrl_mean)`
  # at backend/generator/onset_recovery.py:140 -- a structural blind spot
  # for cohort-level DECREASES. For a decrease where val < ctrl_mean, abs(val)
  # is bounded above by ~ctrl_mean, never approaching 2x ctrl_mean. Cohort
  # adversity that manifests as 25-40% decreases is invisible to the engine
  # regardless of how dramatic the cohort-level signal is. AUDIT-21's
  # resolution path explicitly names this ("Also fix direction-handling --
  # `abs(val) > threshold` ignores decreases (RBC/HGB would never trigger)").
  # 43066 is the first study to surface direction-handling cohort-level
  # adversity that the matcher captures.
  #
  # Two assertions test sister-marker direction-handling reproduction:
  #
  # 1. ALP M decrease SCIENCE-FLAG: cohort M 0.62x (38% decrease), severity
  #    warning, tr_adverse, target-organ-flag=true on hepatic. Engine 0/10
  #    HIGH because (a) M cohort decrease cannot fire 2x rule on val <
  #    ctrl_mean, and (b) F cohort 0.74x is severity=normal so engine filter
  #    skips F. Worst-case Stream 6 direction-handling miss.
  #
  # 2. ALT F decrease SCIENCE-FLAG: cohort F 0.71x g=-1.99 (29% decrease),
  #    severity=adverse, tr_adverse, target-organ-flag=true on hepatic.
  #    Engine 0/10 HIGH for same reason. Sister-marker reproduction in
  #    different sex -- demonstrates direction-handling is sex-agnostic.
  #
  # Both use min_count=5 paralleling PC AST template ("≥5 of N HIGH subjects
  # expected"). Cross-species coverage now: rat increases (PC + TOXSCI-96298)
  # + dog increases (35449) + dog decreases (43066). Spans both halves of
  # Stream 6's blast radius captured in AUDIT-21.
  - type: "onset_concordance"
    description: "HIGH ALP onset registered for >=5 subjects by day 29 (cohort M 0.62x g=-2.29 38% decrease tr_adverse -- engine emits 0/10 SCIENCE-FLAG Stream 6 NEW: direction-handling blind spot, 2x rule cannot fire on cohort decreases)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^ALP$"
    max_onset_day: 29
    min_count: 5
  - type: "onset_concordance"
    description: "HIGH ALT onset registered for >=4 subjects by day 29 (cohort F 0.71x g=-1.99 29% decrease tr_adverse; M dose 3 dose-response is non-monotonic with d3 g=+0.46 OPPOSITE direction to engine-assigned direction='down' driven by d1 g=-4.96 -- AUDIT-21 fix correctly excludes d3 M from cohort fallback. F day 29 raw_subject_values has 3 of 5 F HIGH dogs measured; +1 F HIGH dog fires per-subject SD trigger pre-dose. Engine emit 0/10 -> 4/10 post-fix; pin re-calibrated 5->4 to match defensible algorithm output. Stream 6 sister-marker direction-handling reproduction)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^ALT$"
    max_onset_day: 29
    min_count: 4

  # Cross-organ syndrome (Phase 3 matcher #7 -- AUDIT-20 Stream 5 cross-
  # species expansion). TOXSCI-43066 dog Compound A target_organs reaches
  # 14 organ_systems at HIGH 100 mg/kg (renal + hematologic + cardiovascular +
  # hepatic + general + metabolic + reproductive + musculoskeletal + ...) --
  # comparable breadth to PDS rat (14 organs) and PC rat (14 organs), but
  # in a different species (dog). Engine emits 0 cross_organ_syndromes,
  # same engine path as PC SCIENCE-FLAG: definition-spanning gate at
  # generator/syndrome_rollup.py:488 cannot capture multi-organ co-firing
  # when no individual syndrome's `organ` field spans >1 organ_system.
  #
  # SCIENCE-FLAG: Stream 5 cross-species reproduction of PC 7-organ
  # SCIENCE-FLAG (rat -> dog). Pairs with the same study's existing Stream
  # 6 cross-species reproduction (43066 ALP-decrease + ALT-decrease at the
  # onset_concordance matcher). Confirms Stream 5's blast radius is
  # species-independent -- the same engine surface gap reproduces across
  # rat (PC, Nimble, PDS) AND dog (43066). >=1 cross_organ_syndromes
  # expected; engine emits 0.
  - type: "cross_organ_syndrome"
    description: "Multi-organ co-firing (14 target_organs at HIGH 100 mg/kg dog); engine emits 0 cross_organ_syndromes -- SCIENCE-FLAG Stream 5 cross-SPECIES reproduction (rat -> dog parallel to Stream 6 evidence)"
    min_count: 1

  # tumor_detected (Phase 3 matcher #4 -- AUDIT-16 per-study expansion). 1-month
  # + 2-week-recovery dog study (Compound A, 14-organ multi-target co-firing
  # study with Stream 5 + Stream 6 cross-species SCIENCE-FLAGs). Engine emits
  # has_tumors=false with empty summaries. Defensible per regulatory toxicology
  # convention -- 1-month canine repeat-dose cannot detect neoplasms regardless
  # of multi-organ adversity; carcinogenicity assessment is rodent-only with
  # 2-year design. Absence pin -- regression pin locking engine's correct
  # refusal even under aggressive multi-organ-effect conditions.
  - type: "tumor_detected"
    description: "No tumors expected in 1-month dog repeat-dose (Compound A, 14 target_organs at HIGH); engine has_tumors=false (regression pin)"
    expected_has_tumors: false

  # severity_distribution (Phase 3 matcher #2 -- AUDIT-15 per-study expansion).
  # Authored from per-finding pathologist severity grades in SEND MA records:
  # the toxicologic pathologist's grade IS the regulatory authority per STP
  # severity grading conventions. Despite 14 target_organs flagged at HIGH
  # (Stream 5 SCIENCE-FLAG), only integumentary reaches moderate (3.0); other
  # 13 organs hover at mild grade (1.0-2.0). Locks integumentary-moderate floor.
  # The engine's max_severity-as-derived-aggregate is showing that broad target-
  # organ flagging here reflects effect breadth (many organs) without depth
  # (most at mild) -- a different signature from PDS (multi-organ at moderate).
  # Organs below moderate omitted per "if ambiguous, omit".
  - type: "severity_distribution"
    description: "Moderate integumentary grade (1-month dog Compound A; broad-but-shallow multi-organ pattern, only integumentary reaches moderate)"
    expected_severity:
      integumentary: { min: 3 }

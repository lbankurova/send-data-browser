# TOXSCI 43066 — 1-Month Dog Compound A (5492, IDO1 Inhibitor)
# Source: No study report. TOXSCI-24-0062 Cross Study Analysis.

study_id: "TOXSCI-24-0062--43066 1 month dog- Compound A-xpt"
origin: real
source: "TOXSCI-24-0062 publication data. No study report."

design:
  species: "Dog"
  strain: "Beagle"
  route: "Oral gavage"
  groups: 4
  doses: [0, 25, 50, 100]
  dose_unit: "mg/kg/day"
  duration: "1 month + 2-week recovery"
  recovery: true
  recovery_pairs: 3  # Control + Mid + High
  n_per_group: 6  # 3M+3F
  n_recovery_per_group: 4  # 2M+2F
  control_type: "VEHICLE_CONTROL"
  vehicle: "0.5% Methocel A4M, 0.1% Tween 80, 99.4% water"
  treatment: "5492"
  pharmacologic_class: "IDO1 inhibitor (selective indoleamine-pyrrole 2,3-dioxygenase 1)"
  note: "3 recovery pairs (unusual — most studies recover only Control + High). Sex-divergent NOAEL (M: 0, F: 25 mg/kg/day). Paired with rat Compound A study (96298)."

noael:
  combined:
    dose_level: null
    label: "Not established"
    loael_dose_level: 1
    confidence: 0.8
    note: "LOAEL at lowest active dose -- NOAEL below tested range"
  female: { dose_level: 1, label: "Low (25 mg/kg/day)", loael_dose_level: 2, confidence: 0.6 }

target_organs: {}

injected_signals: []

assertions:
  - type: "design_groups"
    description: "4 groups with 3 recovery pairs"
  - type: "sex_divergent_noael"
    description: "NOAEL differs by sex — M at control, F at 25 mg/kg/day"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from TOXSCI-24-0062 publication data. Combined NOAEL=null (LOAEL
  # at Group 1 = 25 mg/kg). Sex-divergent: F-NOAEL=1 (25 mg/kg) but the
  # current harness has no female-NOAEL matcher, so only Combined is encoded.
  # No deaths. target_organs documented as {} (silent); omitting the assertion
  # because the engine flags 7 organs and "silence is not denial" -- per the
  # audit plan's "if ambiguous, omit" directive.

  - type: "noael_combined"
    description: "Combined NOAEL = null (LOAEL at Group 1 per published data)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = 1 (25 mg/kg)"
    expected_value: 1

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths)"
    expected_value: null

  - type: "class_distribution"
    description: "Engine produces tr_adverse findings (LOAEL fires); all findings classified"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Sex-specific NOAEL: published TOXSCI-24-0062 analysis identifies a
  # sex-divergent NOAEL (per noael block above + existing sex_divergent_noael
  # assertion). M-NOAEL = 0 (below tested range -- M shows effects at lowest
  # active dose) and F-NOAEL = 1 (25 mg/kg, F tolerates Low). Engine returns
  # M=null and F=null. M matches doc (null = "below tested range"); F is a
  # NEW SCIENCE-FLAG -- engine fails to recognize female tolerance at Low.
  #
  # Same root cause as TOXSCI-87497 (Stream 2 low-dose severity) but on the
  # F stratum. Adds evidence to Stream 2's blast radius.

  - type: "noael_combined"
    description: "Male NOAEL = null (M shows effects at lowest active dose per published analysis)"
    sex: "M"
    expected_value: null

  - type: "noael_combined"
    description: "Female NOAEL = 1 (Low 25 mg/kg tolerated per published call; SCIENCE-FLAG vs engine null -- Stream 2 evidence)"
    sex: "F"
    expected_value: 1

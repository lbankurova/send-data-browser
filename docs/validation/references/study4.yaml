# Study4 — Adjuvanted Influenza Vaccines (SENDVACC10, SENDVACC99) in NZW Rabbits
# Source: rabbivi.pdf (study report, 752 pages), nSDRG
# All findings considered NOT adverse — pharmacology-related

study_id: CBER-POC-Pilot-Study4-Vaccine
origin: synthetic
source: "rabbivi.pdf pp.9-12, nSDRG"

design:
  species: "Rabbit"
  strain: "New Zealand White"
  route: "Intramuscular"
  groups: 3  # Control + SENDVACC10 + SENDVACC99
  doses: [0, 12.5, 12.5]  # NaCl 0.9%, SENDVACC10 (12.5mg/15 units), SENDVACC99 (12.5mg/45 units)
  dose_unit: "mg/dose"
  duration: "29 days (3 doses, q2w)"
  recovery: true
  recovery_duration: "28 days"
  n_per_group: 20  # 10M+10F (5/sex main, 5/sex recovery)
  control_type: "NEGATIVE_CONTROL"  # NaCl 0.9%

noael:
  combined:
    dose_level: null
    label: "Not established"
    note: "LOAEL at lowest active dose -- NOAEL below tested range. Engine correct without D9 — vaccine findings are statistically tr_adverse. Report says all non-adverse (pharmacology). NOAEL shifts once D9 compound profile scoring is active."

target_organs: {}

# Signals documented in study report summary (rabbivi.pdf pp.10-12).
# All pharmacology-related, non-adverse per investigators.
injected_signals:
  - name: "CRP elevation"
    domain: "LB"
    test_pattern: "c.reactive|crp"
    direction: "up"
    expected_class: "tr_adverse"
    note: "Both vaccines induced increase. Considered non-adverse, reversible. (report p.10)"

  - name: "Fibrinogen elevation"
    domain: "LB"
    test_pattern: "fibrinogen"
    direction: "up"
    expected_class: "tr_adverse"
    note: "Both vaccines. Considered non-adverse, reversible, pharmacology-related. (report p.10)"

  - name: "A/G ratio decrease"
    domain: "LB"
    test_pattern: "a/g|albumin.*globulin"
    direction: "down"
    note: "Both vaccines. (report p.10)"

  - name: "Body weight loss (transient)"
    domain: "BW"
    note: "Transient minimal BW loss after 1st (F) and 2nd (both sexes) injections. Did not impact terminal BW. Associated with lower food consumption. (report p.10)"

  - name: "Food consumption decrease (transient)"
    domain: "FW"
    note: "Minimally lower, same periods as BW loss. (report p.10)"

  - name: "Spleen weight increase"
    domain: "OM"
    specimen_pattern: "spleen"
    note: "Both vaccines. Absolute and relative (to body and brain). Partial recovery in M, complete in F. (report p.10)"

  - name: "Spleen hyperplasia"
    domain: "MI"
    specimen_pattern: "spleen"
    note: "Lymphoid hyperplasia. Both vaccines. Correlated with weight increase. (report p.10)"

  - name: "Regional LN hyperplasia"
    domain: "MI"
    specimen_pattern: "lymph|iliac|inguinal|sacral|mesenteric|mandibular"
    note: "Lymphoid hyperplasia and granulocyte infiltration. Both vaccines. Enlarged right inguinal LN in M (SENDVACC99). (report p.10)"

  - name: "Injection site inflammation"
    domain: "MI"
    specimen_pattern: "injection|administration|muscle"
    note: "Subacute inflammation. Both vaccines. Partial recovery by end of 4-week period. (report p.10)"

  - name: "WBC/neutrophil/monocyte increases"
    domain: "LB"
    test_pattern: "white blood|neutrophil|monocyte|large unstained"
    direction: "up"
    note: "Minimally increased. SENDVACC10 F: WBC + monocytes. Both vaccines: large unstained cells. After 3rd admin. (report p.10)"

  - name: "Abdominal adipose edema"
    domain: "MI"
    specimen_pattern: "adipose|abdominal"
    note: "Gelatinous abdominal adipose tissue (F), correlating with edema at microscopy. Both vaccines. (report p.10)"

assertions:
  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from rabbivi.pdf pp.10-12. 3-group design (Control + SENDVACC10 +
  # SENDVACC99). Investigators classified ALL vaccine findings (CRP/fibrinogen
  # elevation, spleen + LN hyperplasia, transient BW/FW changes, injection-site
  # reaction, abdominal adipose edema) as pharmacology-related and non-adverse.
  #
  # GROUND_TRUTH per the credentialed reviewer's call:
  #   noael_combined = 2   (highest tested vaccine dose tolerated)
  #   loael_combined = null (no findings deemed adverse)
  #   mortality_loael = null (zero deaths)
  #   target_organs_flagged = []  (no targets per investigators)
  #
  # ENGINE DISAGREEMENT (expected at time of authoring):
  #   Same SCIENCE-FLAG pattern as Study2: engine returns noael=null, loael=1,
  #   5 organs flagged because compound-class context is absent. Encoding the
  #   report's call as GROUND_TRUTH per the audit-plan directive; baseline
  #   captures the failures as SCIENCE-FLAG, not author error. Both vaccine
  #   studies (Study2, Study4) trace to the same engine gap; D9 compound
  #   profile scoring is the resolution path.

  - type: "noael_combined"
    description: "Combined NOAEL = 2 (highest vaccine dose tolerated per report; engine over-classifies)"
    expected_value: 2

  - type: "loael_combined"
    description: "Combined LOAEL = null (no findings deemed adverse by report; SCIENCE-FLAG)"
    expected_value: null

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths)"
    expected_value: null

  - type: "target_organs_flagged"
    description: "Zero target organs (report: pharmacology; SCIENCE-FLAG vs engine 5-organ flagging)"
    expected_organs: []
    expect_only: true

  # Class distribution: same SCIENCE-FLAG pattern as Study2 -- report says no adverse,
  # engine produces 63 tr_adverse. Mechanical encoding of D9 compound-class gap at source.
  - type: "class_distribution"
    description: "Zero tr_adverse per report (all pharmacology); SCIENCE-FLAG vs engine 63 tr_adverse"
    expected_classes:
      tr_adverse: { max: 0 }
      not_assessed: { exact: 0 }

  # Compound class flag (Phase 3 matcher #5 -- AUDIT-7). Source: SME-confirmed
  # annotation `backend/annotations/CBER-POC-Pilot-Study4-Vaccine/
  # compound_profile.json` -- compound_class: "vaccine_adjuvanted",
  # original_compound_class: "vaccine", confirmed_by_sme: true. Adjuvanted
  # influenza vaccines SENDVACC10 + SENDVACC99 in NZW rabbits (rabbivi.pdf
  # pp.9-12). Expected MISMATCH: same D9 root cause as Study1/2/3 -- engine
  # has no vaccine classifier; output is null. The vaccine_adjuvanted SME
  # subclass would matter downstream (adjuvant-specific expected effects)
  # but is currently unsignaled. Both vaccine studies (Study2 + Study4) trace
  # this same gap.
  - type: "compound_class_flag"
    description: "Compound modality = vaccine (SENDVACC10/99 IM rabbit; SME-confirmed vaccine_adjuvanted)"
    expected_compound_class: "vaccine"

  # Recovery verdict (Phase 3 matcher #6 -- AUDIT-17 per-study expansion of
  # recovery_verdict beyond PointCross). Sources:
  #   1. recovery_verdicts.json: Study4 has n=20 recovery subjects (10 per
  #      group across "Group 2 SENDVACC10 Recovery" dose_level=1 and
  #      "Group 3 SENDVACC99 Recovery" dose_level=2). 1065 records emitted
  #      with rich verdict distribution (180 anomaly, 160 persistent, 110
  #      partially_reversed, 100 reversed) -- vaccine + adjuvant produces
  #      a multi-organ immune response with mixed temporal trajectories.
  #   2. unified_findings.json: lymphoid hyperplasia + injection-site lesions
  #      are documented expected vaccine effects (rabbivi.pdf pp.9-12).
  #
  # 1. LYMPH NODE INGUINAL HYPERPLASIA Group 2 (dose_level=1, 10/10 persistent):
  #    immune-stimulating hyperplasia at draining lymph node persists 28 days
  #    post-dose. Main arm 5/5 sev 1.3 (group_stats); recovery 10/10 sev
  #    similar. Engine correctly emits "persistent" -- the antigen-driven
  #    immune response is sustained. MATCH at min_count=10. This is a direct
  #    counter-example to PC's HIGH hepatic hypertrophy SCIENCE-FLAG: same
  #    structural shape (cohort main-arm finding present + cohort recovery
  #    finding present) but engine here emits "persistent" correctly while
  #    PC engine emits "anomaly" wrongly. Stream 4 false-anomaly does NOT
  #    reproduce here.
  #
  # 2. SITE, INJECTION HEMORRHAGE Group 2 (dose_level=1, 10/10 reversed):
  #    acute injection-site reaction (mechanical + adjuvant) resolves
  #    completely in 28-day recovery window. MATCH at min_count=10. Pins
  #    engine's correct identification of the canonical reversible injection-
  #    site finding for vaccine studies.
  #
  # 3. LIVER INFILTRATE Group 3 (dose_level=2, 10/10 persistent): higher-dose
  #    adjuvant produces hepatic mononuclear infiltrate that persists at
  #    28-day recovery. Engine correctly emits "persistent". MATCH at
  #    min_count=10. Adds a non-injection-site organ to the persistent-class
  #    coverage.
  #
  # Stream 4 does NOT reproduce in Study4 across 3 finding-class shapes:
  # immune hyperplasia (persistent), acute hemorrhage (reversed), and
  # parenchymal infiltrate (persistent). Combined with instem and PDS
  # negative-reproduction evidence, the PC HIGH hepatic hypertrophy SCIENCE-
  # FLAG appears specific to PointCross's data shape -- possibly the dual-
  # recovery cohort structure (3R + 4R) or the precise main-arm sev 2.56 ->
  # recovery sev 2.0 transition triggering an edge case in
  # compute_incidence_recovery's verdict assignment. AUDIT-18 (engine fix
  # for Stream 4) remains scoped to PC repro until further evidence; the
  # blast radius initially suspected after AUDIT-5 is NOT confirmed.
  - type: "recovery_verdict"
    description: "Group 2 lymph node inguinal hyperplasia: persistent verdict (10/10 cohort; engine correctly catches sustained antigen-driven immune response -- counter-example to PC HIGH hepatic hypertrophy Stream 4 anomaly)"
    dose_level: 1
    domain: "MI"
    specimen_pattern: "LYMPH NODE, INGUINAL"
    finding_pattern: "HYPERPLASIA"
    expected_verdict: "persistent"
    min_count: 10
  - type: "recovery_verdict"
    description: "Group 2 injection-site hemorrhage: reversed verdict (10/10 cohort; engine correctly identifies acute injection-site reaction resolving in 28-day recovery)"
    dose_level: 1
    domain: "MI"
    specimen_pattern: "SITE, INJECTION"
    finding_pattern: "HEMORRHAGE"
    expected_verdict: "reversed"
    min_count: 10
  - type: "recovery_verdict"
    description: "Group 3 liver infiltrate: persistent verdict (10/10 cohort; engine correctly catches adjuvant-driven hepatic mononuclear infiltrate persisting at recovery)"
    dose_level: 2
    domain: "MI"
    specimen_pattern: "LIVER"
    finding_pattern: "INFILTRATE"
    expected_verdict: "persistent"
    min_count: 10

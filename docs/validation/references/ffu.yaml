# FFU — Repeat-Dose IV Multi-Compound in Cynomolgus
# Source: define.pdf only. No study report.
# Real study (FDA contribution), not synthetic.

study_id: FFU-Contribution-to-FDA
origin: real
source: "define.pdf only. No study report."

design:
  species: "Primate"
  strain: "Cynomolgus"
  route: "Intravenous"
  groups: 5
  doses: [0, 4, 6, 8, 12]
  dose_unit: "mg/kg"
  duration: "~7 weeks (last dosing day 47)"
  recovery: false
  n_per_group: 2  # 0M+2F — female only
  sex: "F"
  control_type: "VEHICLE_CONTROL"
  vehicle: "15 mM histidine buffer, pH 6.0"
  is_multi_compound: true
  n_compounds: 3  # Compound 1 (12 mg/kg), Compound 2 (4, 8 mg/kg), Compound 3 (6 mg/kg)
  note: "Atypical: NHP, IV, female-only, multi-compound (3 test articles across groups), N=2/group."

noael:
  combined:
    dose_level: null
    label: "Not established"
    confidence: 0.8
    note: "LOAEL at lowest active dose -- NOAEL below tested range"

target_organs: {}

injected_signals: []  # Real study, no ground truth

assertions:
  - type: "multi_compound_detected"
    description: "is_multi_compound = true, 3 compounds detected"
  - type: "trend_suppressed"
    description: "JT trend across compounds suppressed (meaningless across different test articles)"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from define.pdf only (no separate study report). FDA contribution
  # dataset: NHP IV multi-compound, female-only, N=2/group across 5 groups
  # representing 3 different test articles at varying doses. Multi-compound
  # design makes "combined LOAEL across all groups" semantically ill-defined:
  # the doc YAML's note says "LOAEL at lowest active dose" but the engine
  # returns LOAEL=4. Both are arguably defensible -- doc applies the standard
  # framework, engine may be flagging the highest-effect group. Omitting
  # loael_combined per the audit plan's "if ambiguous, omit" directive.
  #
  # noael_combined and mortality are unambiguous (no defensible NOAEL across
  # mixed compounds; zero deaths).

  - type: "noael_combined"
    description: "Combined NOAEL = null (multi-compound design; per-compound NOAEL not derivable from combined matcher)"
    expected_value: null

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths)"
    expected_value: null

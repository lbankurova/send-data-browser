# CJ16050 — Compound A: Respiratory Safety Pharmacology in SD Rats
# Source: nSDRG (data packaging only) + raw RE domain data
# ICH S7A Core Battery — Respiratory

study_id: CJ16050-xptonly
origin: synthetic
source: "nSDRG (data packaging only). Signal data extracted from RE domain records."

design:
  species: "Rat"
  strain: "Sprague-Dawley"
  route: "Oral gavage"
  groups: 3  # parallel: vehicle, 100, 1000 mg/kg
  doses: [0, 100, 1000]
  dose_unit: "mg/kg"
  duration: "single dose + 8h observation"
  recovery: false
  n_per_group: 6  # males only
  sex: "M"
  control_type: "VEHICLE_CONTROL"
  glp: false
  vehicle: "0.5 w/v% methylcellulose 400"
  measurement_method: "Whole body plethysmography"

noael:
  combined:
    dose_level: null
    label: "Not established"
    note: "LOAEL at lowest active dose -- NOAEL below tested range. Both treated doses produce effects (100 = stimulation, 1000 = depression)."

target_organs: {}

# No study report. Signals confirmed from raw RE domain data (270 records, 3 endpoints).
# Biphasic dose-response: 100 mg/kg stimulates, 1000 mg/kg depresses.
injected_signals:
  - name: "Respiratory rate stimulation (100 mg/kg)"
    domain: "RE"
    test_pattern: "respiratory rate|resprate"
    direction: "up"
    note: "100 mg/kg: RR ~186 vs control ~95 bpm at 1h (~2x). Sustained through 8h. (from raw RE data)"

  - name: "Tidal volume suppression (1000 mg/kg)"
    domain: "RE"
    test_pattern: "tidal volume|tidalvol"
    direction: "down"
    note: "1000 mg/kg: TV ~1.05 vs control ~1.45 mL at 1h (~-27%). Sustained through 8h. (from raw RE data)"

  - name: "Minute volume suppression (1000 mg/kg)"
    domain: "RE"
    test_pattern: "minute volume|mv"
    direction: "down"
    note: "1000 mg/kg: MV ~106 vs control ~137 mL/min at 1h (~-23%). Drops to ~50% control by 4h. (from raw RE data)"

  - name: "Minute volume stimulation (100 mg/kg)"
    domain: "RE"
    test_pattern: "minute volume|mv"
    direction: "up"
    note: "100 mg/kg: MV ~270 vs control ~137 mL/min at 1h (~2x). Driven by RR increase. (from raw RE data)"

  - name: "Decreased activity (1000 mg/kg)"
    domain: "CL"
    note: "6/6 animals at 1000 mg/kg showed 'Decreased activity' post-dose. 0% at lower doses. Consistent with CNS/respiratory depression."

  - name: "Non-monotonic dose-response"
    note: "Biphasic: 100 mg/kg stimulates (RR/MV up), 1000 mg/kg depresses (RR/TV/MV down + clinical signs). Not a simple linear dose-response."

assertions:
  - type: "parallel_design"
    description: "3 parallel groups correctly parsed"
  - type: "non_monotonic_detected"
    description: "Engine should detect non-monotonic dose-response pattern"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from raw RE domain data + nSDRG (no separate study report).
  # Single-dose 8h respiratory safety pharm; both treated doses (100, 1000)
  # produce effects (biphasic: 100=stimulation, 1000=depression). LOAEL at
  # lowest active dose (100 mg/kg, level 1), NOAEL below tested range. 0
  # deaths. target_organs omitted -- safety-pharm rate/volume changes don't
  # map to organ pathology in the toxicological sense; doc is silent.

  - type: "noael_combined"
    description: "Combined NOAEL = null (LOAEL at lowest active dose, both treated doses produce effects)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = 1 (100 mg/kg, lowest active dose)"
    expected_value: 1

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths; single-dose 8h observation)"
    expected_value: null

  # Class distribution: 5 RE-domain findings; engine flags all 5 as tr_adverse
  # (biphasic effects at both treated doses). Confirms engine fires adverse on
  # respiratory rate / minute volume / tidal volume / activity changes.
  - type: "class_distribution"
    description: "Engine flags RE-domain findings as tr_adverse (biphasic effects at both doses)"
    expected_classes:
      tr_adverse: { min: 1 }

  # tumor_detected (Phase 3 matcher #4 -- AUDIT-16 per-study expansion). Single-
  # dose acute respiratory pharmacology study (Sprague-Dawley rat, 8h post-dose
  # observation). Engine emits has_tumors=false with empty summaries. Defensible
  # per regulatory toxicology convention -- single-dose 8h-observation acute
  # study cannot detect neoplasms (carcinogenicity assessment requires 2-year
  # rodent design; even subchronic 90-day rodent shows tumors only as incidental).
  # Absence pin -- regression pin locking engine's correct refusal under acute
  # single-dose conditions.
  - type: "tumor_detected"
    description: "No tumors expected in single-dose 8h acute respiratory pharm (rat); engine has_tumors=false (regression pin)"
    expected_has_tumors: false

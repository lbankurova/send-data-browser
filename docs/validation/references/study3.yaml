# Study3 — AAV Gene Therapy (VECTOR A / VECTOR B) in Cynomolgus Monkeys
# Source: VECTORSTUDYU1_RedactedSummaryReport.pdf, nSDRG
# Two treatment groups, no vehicle control. Non-GLP.

study_id: CBER-POC-Pilot-Study3-Gene-Therapy
origin: synthetic
source: "VECTORSTUDYU1_RedactedSummaryReport.pdf, nSDRG"

design:
  species: "Primate"
  strain: "Cynomolgus"
  route: "Intravenous (IV bolus, saphenous vein)"
  groups: 2  # VECTOR A (Group 1) + VECTOR B (Group 5). No control.
  doses: []  # both dose_value=None in XPT (biologic — no numeric dose)
  dose_unit: "vg/kg"
  note_doses: "Both groups at 1.024x10^13 GC/kg but XPT encodes dose_value=None"
  duration: "24 weeks (single dose on Day 1)"
  recovery: false  # all sacrificed at terminal (Day 169)
  n_per_group: 3  # males only
  sex: "M"
  has_concurrent_control: false
  glp: false
  note: "Animals prescreened for anti-AAV NAb (100 screened, 6 enrolled with titers <=1:5). Immunosuppression administered. Groups numbered 1 and 5 (gap suggests modified study design). Frozen tissue collected for biodistribution PCR."

noael:
  combined:
    dose_level: null
    label: "Not established"
    derivation: "no_concurrent_control"
    note: "No formal NOAEL — no vehicle control, single dose level per vector. Report states 'no adverse test article-related findings.'"

target_organs: {}

# Report conclusion: "No adverse test article-related findings were noted; the test article
# was considered to be tolerated." Microscopic findings minimal and non-adverse.
injected_signals: []
  # Microscopic findings present but ALL considered non-adverse:
  # - Kidney basophilic tubule (minimal, 0/3 VECTOR A, 1/3 VECTOR B)
  # - Cecum mononuclear cell infiltrate (minimal, 2/3 both groups)
  # - Colon mononuclear cell infiltrate (minimal, 2/3 VECTOR A, 3/3 VECTOR B)
  # Without a control group, cannot distinguish from background incidence.

assertions:
  # ---- Existing concrete assertions (kept) ----------------------------------
  - type: "zero_adverse"
    description: "No tr_adverse findings -- no concurrent control, report states 'no adverse test article-related findings'"
  - type: "no_concurrent_control"
    description: "has_concurrent_control = false"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from VECTORSTUDYU1_RedactedSummaryReport.pdf + nSDRG. The report
  # explicitly states "the test article was considered to be tolerated; no
  # adverse test article-related findings were noted." With no concurrent
  # control, the engine cannot derive NOAEL/LOAEL via per-finding adversity
  # statistics -- noael_summary.json combined row is (null, null), which is
  # the *correct* output: a NOAEL or LOAEL claim would be indefensible without
  # a baseline cohort.
  #
  # These three assertions mechanically protect that defensible "null" output
  # against a future engine change that fabricates a NOAEL by, e.g., comparing
  # vector A vs vector B as if one were a control.

  - type: "noael_combined"
    description: "Combined NOAEL = null (no concurrent control -> no defensible NOAEL)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = null (no concurrent control -> no defensible LOAEL)"
    expected_value: null

  - type: "mortality_loael"
    description: "mortality_loael = null (zero deaths; engine must NOT invent a mortality LOAEL from non-mortality findings)"
    expected_value: null

  - type: "target_organs_flagged"
    description: "Zero target organs flagged -- report's 'no adverse findings' must surface as empty target_organ_summary"
    expected_organs: []
    expect_only: true

  # Class distribution: no concurrent control -> all findings must be not_assessed.
  # Same mechanical guard as Study1.
  - type: "class_distribution"
    description: "All findings not_assessed (no concurrent control; engine must not fabricate adversity calls)"
    expected_classes:
      tr_adverse: { exact: 0 }
      tr_non_adverse: { exact: 0 }
      tr_adaptive: { exact: 0 }
      equivocal: { exact: 0 }
      not_treatment_related: { exact: 0 }

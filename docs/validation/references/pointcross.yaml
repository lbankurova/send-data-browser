# PointCross — 13-Week Repeat-Dose Toxicity (Ground Truth)
# Source: nSDRG Section 6.2 — 13 explicitly engineered signals
# PhUSE SEND pilot dataset (MIT license)

study_id: PointCross
origin: synthetic
source: "nSDRG Section 6.2, 13 engineered signals"

design:
  species: "Rat"
  strain: "Sprague-Dawley"
  route: "Oral gavage"
  groups: 4
  doses: [0, 2, 20, 200]
  dose_unit: "mg/kg"
  duration: "13 weeks"
  recovery: true
  n_per_group: 20  # 10M+10F main study
  n_recovery_per_group: 10  # 5M+5F
  control_type: "VEHICLE_CONTROL"

noael:
  combined: { dose_level: null, label: "Not established", note: "LOAEL at lowest active dose (2 mg/kg) -> NOAEL below tested range" }
  loael: { dose_level: 1, label: "Group 2 (2 mg/kg)" }
  mortality_loael: { dose_level: 3, label: "Group 4 (200 mg/kg)" }

target_organs:
  primary: ["hepatic"]
  secondary: ["hematologic"]

# Signals documented in nSDRG Section 6.2.
# These were deliberately engineered into the synthetic dataset.
injected_signals:
  - name: "Body weight decreased"
    groups: [3, 4]
    domain: "BW"

  - name: "Body weight gain decreased"
    groups: [3, 4]
    domain: "BG"

  - name: "AST increased"
    groups: [4]
    domain: "LB"
    test_pattern: "aspartate aminotransferase|ast"

  - name: "ALT increased"
    groups: [4]
    domain: "LB"
    test_pattern: "alanine aminotransferase|alt"

  - name: "ALP increased"
    groups: [4]
    domain: "LB"
    test_pattern: "alkaline phosphatase|alp"

  - name: "RBC decreased (M)"
    groups: [4]
    domain: "LB"
    test_pattern: "erythrocyte|rbc"
    sex: "M"
    expected_class: "tr_adverse"

  - name: "RBC decreased (F)"
    groups: [4]
    domain: "LB"
    test_pattern: "erythrocyte|rbc"
    sex: "F"
    expected_class: "tr_adverse"
    note: "Reduced confidence expected — sex-differential baseline sensitivity in rats. See classification-verdicts.md S1."

  - name: "HGB decreased"
    groups: [4]
    domain: "LB"
    test_pattern: "hemoglobin|hgb"

  - name: "HCT decreased"
    groups: [4]
    domain: "LB"
    test_pattern: "hematocrit|hct"

  - name: "Liver weights increased"
    groups: [4]
    domain: "OM"
    specimen_pattern: "liver"

  - name: "Liver macroscopic findings"
    groups: [3, 4]
    domain: "MA"
    specimen_pattern: "liver"
    note: "F: 5/10 (p=0.033). M: 4/10 (p=0.087, equivocal). See classification-verdicts.md S2."

  - name: "Liver microscopic findings"
    groups: [3, 4]
    domain: "MI"
    specimen_pattern: "liver"
    note: "Hypertrophy, M+F"

  - name: "Liver tumors"
    groups: [4]
    domain: "TF"
    specimen_pattern: "liver|hepato"
    expected_class: "tr_adverse"
    note: "Adenoma + carcinoma"

assertions:
  # Mortality LOAEL: top-dose HCC deaths drive a treatment-related mortality call.
  # GAP-304 retro: a single-signal PEG architecture would output null here. This assertion
  # blocks that regression mechanically — engine must produce mortality_loael === 3.
  - type: "mortality_loael"
    description: "mortality_loael = 3 (Group 4) — 2 HCC moribund sacrifices (4003 M day 90, 4113 F day 100, latter in recovery cohort)"
    expected_value: 3

  # Cause concordance: ≥2 HCC at top dose across main+recovery is the toxicologist's
  # primary call for "treatment-related." Engine must surface both deaths regardless
  # of cohort. Excluding recovery from the count drops to 1, which fails this gate.
  - type: "mortality_cause_concordance"
    description: ">=2 hepatocellular carcinoma deaths at dose_level 3 (main + recovery cohort)"
    expected_dose_level: 3
    min_count: 2
    cause_pattern: "hepatocellular carcinoma|hcc"

  # NOAEL/LOAEL: combined NOAEL not established (LOAEL at lowest active dose per nSDRG).
  - type: "noael_combined"
    description: "Combined NOAEL = null (not established — LOAEL at Group 2)"
    expected_value: null
  - type: "loael_combined"
    description: "Combined LOAEL = 1 (Group 2, 2 mg/kg)"
    expected_value: 1

  # Target organs: hepatic must be flagged. nSDRG Section 6.2 documents 4 hepatic
  # signals (LB ALT/AST/ALP, OM liver weight, MA macroscopic, MI hypertrophy + tumors).
  - type: "target_organs_flagged"
    description: "hepatic and hematologic flagged as target organs"
    expected_organs: ["hepatic", "hematologic"]

  # Cross-domain WoE: hepatic finding must show convergence across ≥3 domains.
  # This is the mechanical encoding of "weight of evidence" — engine cannot pass
  # by detecting one domain in isolation. PointCross hepatic actually has 4 domains
  # (LB, MA, MI, OM) converging across 3 dose groups.
  - type: "cross_domain_concordance"
    description: "hepatic: >=3 domains converging across >=2 dose groups (WoE integration)"
    organ_system: "hepatic"
    min_domains: 3
    min_groups_converging: 2

  # Class distribution: per nSDRG Section 6.2 the synthetic data has 13 engineered
  # tr_adverse signals at top dose; engine must produce at least that many. Plus
  # not_assessed must be zero (all findings classified — no engine punts).
  - type: "class_distribution"
    description: "13 engineered tr_adverse signals (nSDRG 6.2); all findings classified"
    expected_classes:
      tr_adverse: { min: 13 }
      not_assessed: { exact: 0 }

  # Severity distribution: nSDRG 6.2 documents hepatocellular hypertrophy AND
  # liver adenoma + carcinoma (tumor findings). Tumor findings are graded
  # >= moderate per standard pathology practice, so hepatic max_severity must
  # be >= 3 (moderate). Engine reports 3.0 -- MATCH. This is a Phase 3 first
  # severity_distribution assertion; remaining 15 studies have documentation
  # silent on per-organ severity grades, so are not encoded (per "if ambiguous,
  # omit" directive).
  - type: "severity_distribution"
    description: "Hepatic max_severity >= 3 (hypertrophy + adenoma + carcinoma per nSDRG 6.2)"
    expected_severity:
      hepatic: { min: 3 }

  # Tumor detection: nSDRG Section 6.2 lists "Liver tumors -- Adenoma + carcinoma"
  # as engineered signals at top dose (Group 4). Engine reports has_tumors=true
  # with 5 affected animals and 3 tumor types in tumor_summary.json. Both adenoma
  # and carcinoma morphologies are confirmed in summaries[]. This assertion
  # mechanically pins the engine's correct detection of both tumor types.
  - type: "tumor_detected"
    description: "Liver adenoma + liver carcinoma both detected (nSDRG 6.2 engineered tumors)"
    expected_has_tumors: true
    expected_tumors:
      - organ: "LIVER"
        morphology_pattern: "ADENOMA"
        min_count: 1
      - organ: "LIVER"
        morphology_pattern: "CARCINOMA"
        min_count: 1

  # Compound class flag (Phase 3 matcher #5 -- AUDIT-7). Source: nSDRG dataset
  # is small-molecule by design (oral gavage, hepatic toxicity profile, classic
  # 13-week ICH M3 architecture). Engine emits "small_molecule" via the
  # pk_integration.json modality-detection path (no mAb/ADC/biologic patterns
  # match the synthetic treatment name). MATCH expected -- PointCross is the
  # baseline that confirms the matcher fires correctly when the engine hits
  # its happy path.
  - type: "compound_class_flag"
    description: "Compound modality = small_molecule (oral 13-wk rat tox; engine baseline)"
    expected_compound_class: "small_molecule"

  # Recovery verdict (Phase 3 matcher #6 -- AUDIT-5). Sources:
  #   1. unified_findings.json group_stats for LIVER HYPERTROPHY (F/M, dose_response_pattern=threshold_increase):
  #      - dose_level 0/1/2 (control/low/MED): 0/10 affected
  #      - dose_level 3 (HIGH): 9/10 affected, avg_severity=2.56
  #      MED main arm has NO hypertrophy; HIGH main arm has 9/10 with grade-2-to-3 severity.
  #   2. recovery_verdicts.json per_subject:
  #      - 10 MED-recovery (3R) subjects: HYPERTROPHY rec_severity=2.0, verdict=anomaly
  #      - 10 HIGH-recovery (4R) subjects: HYPERTROPHY rec_severity=2.0, verdict=anomaly
  #
  # MED anomaly is correct: hypertrophy emerges only in recovery (no main-arm
  # finding at MED), so verdict=anomaly is the right call.
  #
  # HIGH anomaly is wrong: main arm shows 9/10 at sev 2.56, recovery shows the
  # finding at sev 2.0 -- that is PERSISTENT (or partially_reversed), not anomaly.
  # The engine's per-subject main_severity=null on HIGH-recovery records suggests
  # the recovery-verdict logic reads this individual's main-arm severity
  # (undefined for recovery animals) rather than the cohort aggregate at the
  # same dose. Encoding the toxicologist's call (persistent) per CLAUDE.md
  # rule 21 (algorithm-as-advisor) and audit-plan "do not weaken assertion to
  # make engine pass."
  - type: "recovery_verdict"
    description: "MED hepatic hypertrophy: anomaly verdict (engine correct -- finding emerges only in recovery)"
    dose_level: 2
    domain: "MI"
    specimen_pattern: "LIVER"
    finding_pattern: "HYPERTROPHY"
    expected_verdict: "anomaly"
    min_count: 10
  - type: "recovery_verdict"
    description: "HIGH hepatic hypertrophy: persistent verdict (main arm 9/10 sev 2.56; engine reports anomaly -- SCIENCE-FLAG)"
    dose_level: 3
    domain: "MI"
    specimen_pattern: "LIVER"
    finding_pattern: "HYPERTROPHY"
    expected_verdict: "persistent"
    min_count: 10

  # Cofiring presentation (AUDIT-19, Stream 5 closure 2026-05-01). PointCross
  # has clear multi-organ toxicity: 16 single-organ-defined syndromes co-fire
  # across 7 organs at HIGH dose -- hepatic XS01, hematologic XS04 + XC01a/c,
  # renal XS03, ocular XC12c, endocrine XC04a, reproductive XC06a/b, general
  # XS07. The original cross_organ_syndromes surface (definition-spanning gate)
  # cannot capture this -- it only fires on syndromes whose DEFINITION spans
  # >1 organ_system (only phospholipidosis qualifies in the corpus).
  #
  # AUDIT-19 added the orthogonal `cofiring_presentations` surface in
  # syndrome_rollup.py:_compute_cofiring_entries -- per (dose, phase) cell,
  # group firing syndromes by primary organ_system and emit when the distinct
  # primary-organ count >= COFIRING_MIN_DISTINCT_ORGANS (=3, calibrated against
  # PC + PDS + 43066 dog corpus). PC HIGH (200 mg/kg, Main Study) fires with
  # 5 distinct organ_systems and 19/20 subjects affected.
  #
  # min_organ_systems=4 pins the rich-presentation form: PC HIGH should have
  # >= 4 distinct organ_systems firing, not just any cofiring entry, because
  # the toxicologist call is "broad multi-organ" rather than minimal.
  - type: "cofiring_presentation"
    description: "Multi-organ co-firing at HIGH (5 organs: general, hematologic, hepatic, ocular, renal; 19/20 subjects). AUDIT-19 (Stream 5) cleared 2026-05-01."
    min_count: 1
    min_organ_systems: 4

  # Onset concordance (Phase 3 matcher #8 -- AUDIT-8). Engine surface:
  # generator/onset_recovery.py builds subject_onset_days.json with
  # domain-specific semantics. For LB the rule is "first measurement day
  # where subject value > 2x control mean" -- a per-subject extreme-elevation
  # threshold. PointCross HIGH-dose (DOSE_GROUP_ORDER=3) cohort means show
  # AST 1.41x M / 1.56x F vs control at terminal day 92, statistically
  # adverse and target-organ-flagged. Most individual subject AST values fall
  # 1.2x-1.8x control (typical noise), so few cross the 2x threshold.
  #
  # Three assertions encode this:
  #
  # 1. Regression pin (MATCH): engine catches >=1 HIGH-dose subject's AST
  #    onset by day 92. Today: PC201708-4009 has LB:AST onset=92. Locks the
  #    current correct emit; would catch a regression to zero.
  #
  # 2. SCIENCE-FLAG: toxicologist's call -- given cohort-level adversity
  #    (1.4x ratio, statistically significant, hepatic-flagged), >=5 of 10
  #    HIGH-dose subjects should have AST onset registered (so the Cohort
  #    view's onset_day filter would surface affected subjects, not just
  #    threshold-crossing outliers). Engine emits 1/10 -- under-detection.
  #    Stream 6 NEW root-cause family: per-subject 2x control-mean threshold
  #    misses cohort-level adversity at <2x per-subject. Distinct from
  #    Stream 4 (recovery_verdict per-subject vs cohort-aggregate schema)
  #    because the code path, mechanism, and consequence all differ:
  #    onset_recovery.py's threshold rule vs recovery_verdicts.py's
  #    main_severity sourcing.
  #
  # 3. CL data-preservation pin (MATCH): PC201708-4105 has CL:ALOPECIA onset
  #    at day 85 (HIGH-dose). CL onset is extracted from
  #    raw_subject_onset_days, not algorithmically computed -- this pins
  #    that the engine preserves the SEND-recorded clinical observation
  #    onset day. >=1 HIGH-dose subject by day 90.
  #
  # MI/MA onset assertions intentionally omitted: engine's MI/MA semantics
  # are sacrifice-day proxy (always = SACRIFICE_DY), so any assertion
  # tautologically passes for affected dose groups. No information value.
  - type: "onset_concordance"
    description: "HIGH AST onset registered for >=1 subject by day 92 (regression pin -- engine catches PC201708-4009 via 2x rule)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^AST$"
    max_onset_day: 92
    min_count: 1
  - type: "onset_concordance"
    description: "HIGH AST onset registered for >=5 of 10 affected subjects by day 92 (cohort 1.41x M / 1.56x F -- engine emits 1/10 SCIENCE-FLAG Stream 6)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^AST$"
    max_onset_day: 92
    min_count: 5
  - type: "onset_concordance"
    description: "HIGH CL:ALOPECIA onset registered for >=1 subject by day 90 (data-preservation pin from raw_subject_onset_days)"
    dose_level: 3
    domain: "CL"
    finding_pattern: "ALOPECIA"
    max_onset_day: 90
    min_count: 1

  # AUDIT-22 expansion: sister hepatic markers (ALT, ALP) reproduce Stream 6
  # within PointCross. Same dose group, same domain, same hepatic target-organ
  # flag (target_organ_summary[hepatic]: target_organ_flag=true, severity=3.0,
  # grade=moderate). Cohort ratios parallel AST in magnitude:
  #   - ALT: M 1.34x g=1.09, F 1.25x g=2.13 at day 92 HIGH
  #   - ALP: M 1.29x g=1.51, F 1.53x g=2.81 at day 92 HIGH
  # Engine emits:
  #   - ALT: 1/29 HIGH subjects (same single subject as AST -- PC201708-4009;
  #     this subject is the lone HIGH-dose individual whose hepatic chemistry
  #     crosses the 2x rule on multiple markers simultaneously)
  #   - ALP: 0/29 HIGH subjects (complete miss -- worst-case Stream 6 even
  #     though F cohort ratio 1.53x exceeds AST F's 1.56x marginally and ALP's
  #     F effect size 2.81 is the strongest of the three hepatic markers)
  # Together with AST these three pins demonstrate Stream 6 is not an
  # AST-specific quirk but reproduces across hepatic chemistry markers in this
  # study, sized monotonically with how close cohort ratio approaches the 2x
  # threshold. ALP's zero emit is the clearest demonstration: large cohort
  # signal, moderate hepatic target-organ flag, full miss by per-subject 2x.
  - type: "onset_concordance"
    description: "HIGH ALT onset registered for >=1 subject by day 92 (regression pin -- engine catches PC201708-4009 via 2x rule, co-firing with AST)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^ALT$"
    max_onset_day: 92
    min_count: 1
  - type: "onset_concordance"
    description: "HIGH ALT onset registered for >=5 subjects by day 92 (cohort M 1.34x / F 1.25x, hepatic flagged -- engine emits 1/29 SCIENCE-FLAG Stream 6 sister)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^ALT$"
    max_onset_day: 92
    min_count: 5
  - type: "onset_concordance"
    description: "HIGH ALP onset registered for >=5 subjects by day 92 (cohort M 1.29x / F 1.53x g=2.81, hepatic flagged -- engine emits 0/29 SCIENCE-FLAG Stream 6 worst-case complete miss)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^ALP$"
    max_onset_day: 92
    min_count: 5

# PointCross — 13-Week Repeat-Dose Toxicity (Ground Truth)
# Source: nSDRG Section 6.2 — 13 explicitly engineered signals
# PhUSE SEND pilot dataset (MIT license)

study_id: PointCross
origin: synthetic
source: "nSDRG Section 6.2, 13 engineered signals"

design:
  species: "Rat"
  strain: "Sprague-Dawley"
  route: "Oral gavage"
  groups: 4
  doses: [0, 2, 20, 200]
  dose_unit: "mg/kg"
  duration: "13 weeks"
  recovery: true
  n_per_group: 20  # 10M+10F main study
  n_recovery_per_group: 10  # 5M+5F
  control_type: "VEHICLE_CONTROL"

noael:
  combined: { dose_level: null, label: "Not established", note: "LOAEL at lowest active dose (2 mg/kg) -> NOAEL below tested range" }
  loael: { dose_level: 1, label: "Group 2 (2 mg/kg)" }
  mortality_loael: { dose_level: 3, label: "Group 4 (200 mg/kg)" }

target_organs:
  primary: ["hepatic"]
  secondary: ["hematologic"]

# Signals documented in nSDRG Section 6.2.
# These were deliberately engineered into the synthetic dataset.
injected_signals:
  - name: "Body weight decreased"
    groups: [3, 4]
    domain: "BW"

  - name: "Body weight gain decreased"
    groups: [3, 4]
    domain: "BG"

  - name: "AST increased"
    groups: [4]
    domain: "LB"
    test_pattern: "aspartate aminotransferase|ast"

  - name: "ALT increased"
    groups: [4]
    domain: "LB"
    test_pattern: "alanine aminotransferase|alt"

  - name: "ALP increased"
    groups: [4]
    domain: "LB"
    test_pattern: "alkaline phosphatase|alp"

  - name: "RBC decreased (M)"
    groups: [4]
    domain: "LB"
    test_pattern: "erythrocyte|rbc"
    sex: "M"
    expected_class: "tr_adverse"

  - name: "RBC decreased (F)"
    groups: [4]
    domain: "LB"
    test_pattern: "erythrocyte|rbc"
    sex: "F"
    expected_class: "tr_adverse"
    note: "Reduced confidence expected — sex-differential baseline sensitivity in rats. See classification-verdicts.md S1."

  - name: "HGB decreased"
    groups: [4]
    domain: "LB"
    test_pattern: "hemoglobin|hgb"

  - name: "HCT decreased"
    groups: [4]
    domain: "LB"
    test_pattern: "hematocrit|hct"

  - name: "Liver weights increased"
    groups: [4]
    domain: "OM"
    specimen_pattern: "liver"

  - name: "Liver macroscopic findings"
    groups: [3, 4]
    domain: "MA"
    specimen_pattern: "liver"
    note: "F: 5/10 (p=0.033). M: 4/10 (p=0.087, equivocal). See classification-verdicts.md S2."

  - name: "Liver microscopic findings"
    groups: [3, 4]
    domain: "MI"
    specimen_pattern: "liver"
    note: "Hypertrophy, M+F"

  - name: "Liver tumors"
    groups: [4]
    domain: "TF"
    specimen_pattern: "liver|hepato"
    expected_class: "tr_adverse"
    note: "Adenoma + carcinoma"

assertions:
  # Mortality LOAEL: top-dose HCC deaths drive a treatment-related mortality call.
  # GAP-304 retro: a single-signal PEG architecture would output null here. This assertion
  # blocks that regression mechanically — engine must produce mortality_loael === 3.
  - type: "mortality_loael"
    description: "mortality_loael = 3 (Group 4) — 2 HCC moribund sacrifices (4003 M day 90, 4113 F day 100, latter in recovery cohort)"
    expected_value: 3

  # Cause concordance: ≥2 HCC at top dose across main+recovery is the toxicologist's
  # primary call for "treatment-related." Engine must surface both deaths regardless
  # of cohort. Excluding recovery from the count drops to 1, which fails this gate.
  - type: "mortality_cause_concordance"
    description: ">=2 hepatocellular carcinoma deaths at dose_level 3 (main + recovery cohort)"
    expected_dose_level: 3
    min_count: 2
    cause_pattern: "hepatocellular carcinoma|hcc"

  # NOAEL/LOAEL: combined NOAEL not established (LOAEL at lowest active dose per nSDRG).
  - type: "noael_combined"
    description: "Combined NOAEL = null (not established — LOAEL at Group 2)"
    expected_value: null
  - type: "loael_combined"
    description: "Combined LOAEL = 1 (Group 2, 2 mg/kg)"
    expected_value: 1

  # Target organs: hepatic must be flagged. nSDRG Section 6.2 documents 4 hepatic
  # signals (LB ALT/AST/ALP, OM liver weight, MA macroscopic, MI hypertrophy + tumors).
  - type: "target_organs_flagged"
    description: "hepatic and hematologic flagged as target organs"
    expected_organs: ["hepatic", "hematologic"]

  # Cross-domain WoE: hepatic finding must show convergence across ≥3 domains.
  # This is the mechanical encoding of "weight of evidence" — engine cannot pass
  # by detecting one domain in isolation. PointCross hepatic actually has 4 domains
  # (LB, MA, MI, OM) converging across 3 dose groups.
  - type: "cross_domain_concordance"
    description: "hepatic: >=3 domains converging across >=2 dose groups (WoE integration)"
    organ_system: "hepatic"
    min_domains: 3
    min_groups_converging: 2

  # Class distribution: per nSDRG Section 6.2 the synthetic data has 13 engineered
  # tr_adverse signals at top dose; engine must produce at least that many. Plus
  # not_assessed must be zero (all findings classified — no engine punts).
  - type: "class_distribution"
    description: "13 engineered tr_adverse signals (nSDRG 6.2); all findings classified"
    expected_classes:
      tr_adverse: { min: 13 }
      not_assessed: { exact: 0 }

  # Severity distribution: nSDRG 6.2 documents hepatocellular hypertrophy AND
  # liver adenoma + carcinoma (tumor findings). Tumor findings are graded
  # >= moderate per standard pathology practice, so hepatic max_severity must
  # be >= 3 (moderate). Engine reports 3.0 -- MATCH. This is a Phase 3 first
  # severity_distribution assertion; remaining 15 studies have documentation
  # silent on per-organ severity grades, so are not encoded (per "if ambiguous,
  # omit" directive).
  - type: "severity_distribution"
    description: "Hepatic max_severity >= 3 (hypertrophy + adenoma + carcinoma per nSDRG 6.2)"
    expected_severity:
      hepatic: { min: 3 }

  # Tumor detection: nSDRG Section 6.2 lists "Liver tumors -- Adenoma + carcinoma"
  # as engineered signals at top dose (Group 4). Engine reports has_tumors=true
  # with 5 affected animals and 3 tumor types in tumor_summary.json. Both adenoma
  # and carcinoma morphologies are confirmed in summaries[]. This assertion
  # mechanically pins the engine's correct detection of both tumor types.
  - type: "tumor_detected"
    description: "Liver adenoma + liver carcinoma both detected (nSDRG 6.2 engineered tumors)"
    expected_has_tumors: true
    expected_tumors:
      - organ: "LIVER"
        morphology_pattern: "ADENOMA"
        min_count: 1
      - organ: "LIVER"
        morphology_pattern: "CARCINOMA"
        min_count: 1

  # Compound class flag (Phase 3 matcher #5 -- AUDIT-7). Source: nSDRG dataset
  # is small-molecule by design (oral gavage, hepatic toxicity profile, classic
  # 13-week ICH M3 architecture). Engine emits "small_molecule" via the
  # pk_integration.json modality-detection path (no mAb/ADC/biologic patterns
  # match the synthetic treatment name). MATCH expected -- PointCross is the
  # baseline that confirms the matcher fires correctly when the engine hits
  # its happy path.
  - type: "compound_class_flag"
    description: "Compound modality = small_molecule (oral 13-wk rat tox; engine baseline)"
    expected_compound_class: "small_molecule"

# TOXSCI 96298 — 1-Month Rat Compound A (5492, IDO1 Inhibitor)
# Source: No study report. TOXSCI-24-0062 Cross Study Analysis.

study_id: "TOXSCI-24-0062--96298 1 month rat- Compound A xpt"
origin: real
source: "TOXSCI-24-0062 publication data. No study report."

design:
  species: "Rat"
  strain: "Sprague-Dawley"
  route: "Oral gavage"
  groups: 4
  doses: [0, 50, 125, 250]
  dose_unit: "mg/kg"
  duration: "1 month"
  recovery: false  # no recovery (unlike its dog counterpart)
  n_per_group_control: 30  # 15M+15F
  n_per_group_low: 20  # 10M+10F
  n_per_group_mid: 30  # 15M+15F
  n_per_group_high: 30  # 15M+15F
  control_type: "VEHICLE_CONTROL"
  vehicle: "Methocel (Methylcellulose)/Tween80/H2O"
  treatment: "5492"
  note: "No recovery period (unlike dog counterpart 43066). Unequal group sizes (Low=20, others=30). Paired with dog Compound A study (43066)."

noael:
  combined:
    dose_level: null
    label: "Not established"
    loael_dose_level: 1
    confidence: 0.8
    note: "LOAEL at lowest active dose -- NOAEL below tested range"

target_organs: {}

injected_signals: []

assertions:
  - type: "design_groups"
    description: "4 groups with unequal N (Low=20, others=30)"
  - type: "no_recovery"
    description: "No recovery period"

  # ---- GROUND_TRUTH equality assertions (Phase 1 audit) ---------------------
  # Authored from TOXSCI-24-0062 publication data (confidence 0.8 per existing
  # YAML). Combined NOAEL=null (LOAEL at Group 1 = 50 mg/kg). 1 real death at
  # dose level 2 (125 mg/kg) per study_mortality.json. Documentation is silent
  # on the death so the mortality_loael=2 assertion accepts the engine's
  # cause-of-death interpretation as defensible (1 actual death, 0 accidental).
  # target_organs documented as {} (silent); omitting -- engine flags 5 but
  # this is an ambiguous case, not a documented zero.

  - type: "noael_combined"
    description: "Combined NOAEL = null (LOAEL at Group 1 = 50 mg/kg per published data)"
    expected_value: null

  - type: "loael_combined"
    description: "Combined LOAEL = 1 (50 mg/kg)"
    expected_value: 1

  - type: "mortality_loael"
    description: "mortality_loael = 2 (1 actual death at Mid dose 125 mg/kg, accepted per engine cause analysis)"
    expected_value: 2

  - type: "class_distribution"
    description: "Engine produces tr_adverse findings (LOAEL fires); all findings classified"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Cross-organ syndrome (Phase 3 matcher #7 -- AUDIT-10). Compound A (5492,
  # IDO1 inhibitor) at the per-subject dose levels in this study triggers
  # phospholipidosis at 32 subjects across the dose range -- the highest n in
  # the corpus. Same multi-organ definition as instem (hepatic+respiratory+
  # renal+hematologic). MATCH pins the syndrome_id, organ span, and n>=32.
  # Sustains the regression pin across two studies, broadening the engine
  # phospholipidosis-detection coverage beyond the single instem anchor.
  - type: "cross_organ_syndrome"
    description: "Phospholipidosis cross-organ entry (hepatic+respiratory+renal+hematologic; n>=32)"
    expected_syndrome_id: "phospholipidosis"
    expected_organs: ["hepatic", "respiratory", "renal", "hematologic"]
    min_count: 32

  # Onset concordance (AUDIT-22 cross-study expansion of AUDIT-8 PointCross
  # anchor). 1-month rat with terminal LB at day 29; HIGH dose group_order=3
  # (15M+15F = 30 subjects, all 30 present in subject_onset_days.json). Two
  # assertions test orthogonal halves of Stream 6:
  #
  # 1. NAG regression pin (MATCH): renal-marker N-acetylglucosaminidase rises
  #    strongly at HIGH F (cohort 1.84x, g=1.20, p=0.001), and the engine
  #    correctly catches 6 HIGH-dose subjects via the 2x rule -- all 6 are
  #    female, consistent with the F-dominant cohort signal. Locks the engine's
  #    correct emission on dramatic-effect renal markers; would catch a
  #    regression to fewer or zero. Demonstrates the per-subject 2x rule works
  #    when the cohort effect is large enough to push individual subjects past
  #    threshold -- this is the engine's design intent, not a defect.
  #
  # 2. CHOL SCIENCE-FLAG: cholesterol rises strongly at HIGH M (cohort 1.68x,
  #    g=2.70, p<0.001) but engine emits 0/30 onsets -- not even the
  #    F-dominant single-subject path that PointCross AST/ALT show. Stream 6
  #    reproduces cleanly across study, compound (Compound A vs PointCross's
  #    different molecule), and finding (cholesterol vs AST/ALT/ALP). Cohort
  #    is statistically real with the largest effect size in this study's LB
  #    panel; toxicologist would call CHOL elevation hepatic-relevant
  #    adversity given concurrent renal involvement. Engine emits 0 because
  #    no individual M HIGH subject reaches 2x baseline mean despite the
  #    population shift. Same root cause as PC AST/ALT/ALP: per-subject 2x
  #    threshold misses cohort-level adversity at <2x per-subject. min_count
  #    set to 5 paralleling PC's "≥5 of N HIGH-dose subjects expected"
  #    framing -- represents the toxicologist's expectation that meaningful
  #    cohort adversity should yield onset on multiple subjects, not zero.
  - type: "onset_concordance"
    description: "HIGH NAG onset registered for >=6 subjects by day 29 (regression pin -- engine catches F-dominant 1.84x cohort signal, 6/30 HIGH subjects all F)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^NAG$"
    max_onset_day: 29
    min_count: 6
  - type: "onset_concordance"
    description: "HIGH CHOL onset registered for >=5 subjects by day 29 (cohort M 1.68x g=2.70 p<0.001 -- engine emits 0/30 SCIENCE-FLAG Stream 6 cross-study reproduction)"
    dose_level: 3
    domain: "LB"
    finding_pattern: "^CHOL$"
    max_onset_day: 29
    min_count: 5

  # tumor_detected (Phase 3 matcher #4 -- AUDIT-16 per-study expansion). 1-month
  # rat repeat-dose study (Compound A, SD, n=30/dose, phospholipidosis-active
  # with cross_organ_syndrome MATCH at n=32 -- the largest phospholipidosis
  # signal in the corpus). Engine emits has_tumors=false with empty summaries.
  # Defensible per regulatory toxicology convention -- 30-day rodent repeat-dose
  # is below carcinogenicity assay duration; tumor formation at this duration
  # is rare/incidental and not a study endpoint regardless of strong multi-organ
  # syndrome activity. Absence pin -- regression pin locking engine's correct
  # refusal under aggressive phospholipidosis-active conditions.
  - type: "tumor_detected"
    description: "No tumors expected in 1-month rat repeat-dose (Compound A, n=30/dose, phospholipidosis-active n=32); engine has_tumors=false (regression pin)"
    expected_has_tumors: false

  # severity_distribution (Phase 3 matcher #2 -- AUDIT-15 per-study expansion).
  # Authored from per-finding pathologist severity grades in SEND MA records:
  # the toxicologic pathologist's grade IS the regulatory authority per STP
  # severity grading conventions. 1-month rat Compound A with the corpus's
  # largest phospholipidosis signal (cross_organ_syndrome n=32). Engine emits
  # 3 organs at >=3: general=3.0, integumentary=3.0, reproductive=4.0. Locks
  # moderate floor on general + integumentary and marked floor on reproductive.
  # The reproductive=4.0 marked grade in a 1-month rat Compound A study likely
  # reflects mammary or sex-organ pathology classified to reproductive --
  # toxicologically significant and worth pinning. Organs below moderate
  # (hepatic=1.11, cardiovascular=1.0, hematologic=2.0, etc.) omitted.
  - type: "severity_distribution"
    description: "Moderate general + integumentary + marked reproductive grades (1-month rat Compound A, phospholipidosis-active; pathologist-graded)"
    expected_severity:
      general: { min: 3 }
      integumentary: { min: 3 }
      reproductive: { min: 4 }

# Nimble/Nimort-01 — 3-Week Repeat-Dose in Fischer 344 Rats
# Source: define.pdf, reviewers-guide.pdf. No study report.

study_id: Nimble
origin: synthetic
source: "define.pdf, reviewers-guide.pdf. No signal documentation."

design:
  species: "Rat"
  strain: "Fischer 344"
  route: "Oral"
  groups: 2  # Control + single treatment
  doses: [0, 10]
  dose_unit: "mg/kg/day"
  duration: "3 weeks"
  recovery: false
  n_per_group: 50  # ~18M+32F (unbalanced)
  control_type: "VEHICLE_CONTROL"
  vehicle: "Saline"
  treatment: "Example Compound Name"
  note: "Only 2 dose groups — no dose-response curve possible. Unbalanced sex ratio (~1:2 M:F). Fischer 344 strain (unusual). Large N."

noael:
  combined: { dose_level: null, label: "Not established", loael_dose_level: 1, confidence: 0.0, note: "Control mortality 28% exceeds 10% subchronic threshold. NOAEL suppressed per EPA/OECD." }

target_organs: {}

injected_signals: []

assertions:
  - type: "design_groups"
    description: "2 groups correctly parsed"
  - type: "no_dose_response"
    description: "Single treatment dose — no dose-response pattern possible"

  # Control-mortality-critical case: Combined NOAEL must be suppressed (null) per
  # CTRL_MORT_CRITICAL qualification (control mortality 28% > 10% threshold). The
  # engine cannot establish a NOAEL when the control cohort itself is unhealthy.
  - type: "noael_combined"
    description: "Combined NOAEL = null (suppressed by CTRL_MORT_CRITICAL — 28% control mortality)"
    expected_value: null

  # Mortality LOAEL: 1/50 treatment deaths is mechanically captured at dose_level 1,
  # but the BIG signal is the 14/50 control mortality flagging study validity.
  # Encoding both as expectations forces the engine to keep producing this output.
  - type: "mortality_loael"
    description: "mortality_loael = 1 (treatment-cohort death captured) — but study validity questioned"
    expected_value: 1

  # Class distribution: study validity questioned (CTRL_MORT_CRITICAL) but findings
  # ARE classified by engine. Confirm engine fires at least one tr_adverse and all
  # findings have a classification (no engine punt).
  - type: "class_distribution"
    description: "Findings classified despite CTRL_MORT_CRITICAL; engine produces some tr_adverse"
    expected_classes:
      tr_adverse: { min: 1 }
      not_assessed: { exact: 0 }

  # Tumor detection: 3-week study, no tumor findings documented; engine confirms
  # has_tumors=false. Regression guard: engine must not start hallucinating
  # tumor signals on this short subchronic study.
  - type: "tumor_detected"
    description: "No tumors expected in 3-week subchronic study"
    expected_has_tumors: false

  # Cofiring presentation (AUDIT-19, Stream 5 retracted 2026-05-01).
  # The original AUDIT-20 SCIENCE-FLAG (>=1 cross_organ_syndrome at HIGH)
  # was authored on a flawed reading: the "8 target_organs at HIGH" claim
  # counted target_organ_summary.json *entries* (8) rather than entries
  # with target_organ_flag=True (1, only `general`). The actual data shows
  # focal lymphoid pathology, not multi-organ adversity:
  #   - MI:VAGINA Lymphoma (M+F, tr_adverse) -- neoplastic, no current
  #     histopath rule covers neoplasms
  #   - MA:THYMUS Small (M+F, tr_adverse) -- gross thymic atrophy; would
  #     map to lymphoid_depletion if "small" were in that rule's vocabulary
  #     (filed as AUDIT-25 follow-up)
  #   - DS:Mortality (M+F, tr_adverse)
  # All three signals collapse to <=2 distinct primary organ_systems
  # (hematologic + reproductive at most), below COFIRING_MIN_DISTINCT_ORGANS=3.
  # Even if AUDIT-25 fixes the lymphoid_depletion vocabulary gap, Nimble's
  # syndrome surface remains structurally focal -- it is NOT a Stream 5
  # cofiring pattern. Pin retracted as data-grounded counter-evidence
  # per CLAUDE.md rule 19.
  #
  # max_count: 0 -- regression guard locking the (correct) absence of
  # cofiring entries on Nimble's focal-lymphoid signal.
  - type: "cofiring_presentation"
    description: "No cofiring expected -- Nimble's signal is focal lymphoid (lymphoma + thymic atrophy + mortality), not multi-organ. AUDIT-20 pin retracted per data-grounded counter-evidence (rule 19)."
    max_count: 0
